<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk 💜 НЕОНОВЫЙ МЕССЕНДЖЕР</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #8a2be2;
            border: 1px solid #8a2be2;
            position: relative;
        }

        /* НЕОНОВЫЕ ЭФФЕКТЫ */
        .neon-text {
            text-shadow: 0 0 5px #b79aff, 0 0 10px #8a6fd0, 0 0 20px #6b4f9f;
        }

        .neon-border {
            box-shadow: 0 0 5px #8a6fd0, 0 0 10px #6b4f9f;
            border: 1px solid #b79aff;
        }

        .neon-glow {
            animation: neonPulse 2s infinite;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #8a6fd0, 0 0 10px #6b4f9f; }
            50% { box-shadow: 0 0 15px #b79aff, 0 0 30px #8a6fd0; }
            100% { box-shadow: 0 0 5px #8a6fd0, 0 0 10px #6b4f9f; }
        }

        @keyframes neonTextPulse {
            0% { text-shadow: 0 0 5px #b79aff, 0 0 10px #8a6fd0; }
            50% { text-shadow: 0 0 15px #ffffff, 0 0 30px #b79aff; }
            100% { text-shadow: 0 0 5px #b79aff, 0 0 10px #8a6fd0; }
        }

        /* Экран входа */
        #auth-screen {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a0b2e, #0a0a0f);
            position: relative;
            overflow: hidden;
        }

        #auth-screen::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(138, 43, 226, 0.1) 10px,
                rgba(138, 43, 226, 0.1) 20px
            );
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .auth-container {
            background: rgba(26, 11, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #8a6fd0;
            box-shadow: 0 0 30px #8a6fd0, 0 0 60px #4f3780 inset;
            position: relative;
            z-index: 10;
            animation: neonGrow 0.5s ease-out;
        }

        @keyframes neonGrow {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .auth-container h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            animation: neonTextPulse 3s infinite;
            letter-spacing: 2px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: #b79aff;
            box-shadow: 0 0 20px #8a6fd0;
        }

        .auth-input::placeholder {
            color: #9a8bb8;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px #8a6fd0;
        }

        /* МОДАЛЬНОЕ ОКНО ОШИБКИ */
        .error-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .error-modal.active {
            display: flex;
        }

        .error-content {
            background: #1a0b2e;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 50px #ff6b6b;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .error-content h3 {
            color: #ff6b6b;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .error-content p {
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .error-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff4444);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px #ff6b6b;
        }

        .error-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff6b6b;
        }

        /* Основной интерфейс */
        #main-app {
            display: none;
            height: 100%;
            flex-direction: column;
            background: radial-gradient(circle at 20% 30%, #2d1b4a, #0f0f1a);
        }

        /* Мобильная навигация */
        .mobile-nav {
            display: flex;
            background: rgba(26, 11, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px;
            gap: 10px;
            border-bottom: 2px solid #8a6fd0;
        }

        .mobile-nav-btn {
            flex: 1;
            padding: 12px;
            background: rgba(45, 27, 74, 0.8);
            border: 1px solid #6b4f9f;
            border-radius: 25px;
            color: #b79aff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .mobile-nav-btn.active {
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            color: white;
            box-shadow: 0 0 20px #8a6fd0;
        }

        /* Контейнер с тремя панелями */
        #panels-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Панель чатов */
        #chats-panel {
            width: 100%;
            background: rgba(45, 27, 74, 0.7);
            backdrop-filter: blur(10px);
            border-right: 2px solid #8a6fd0;
            overflow-y: auto;
            transition: 0.3s;
        }

        /* Панель переписки */
        #chat-panel {
            width: 100%;
            background: rgba(45, 27, 74, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Панель профиля */
        #profile-panel {
            width: 100%;
            background: rgba(45, 27, 74, 0.7);
            backdrop-filter: blur(10px);
            border-left: 2px solid #8a6fd0;
            overflow-y: auto;
        }

        /* Десктопное отображение */
        @media (min-width: 768px) {
            #panels-container {
                display: flex;
            }
            
            #chats-panel {
                width: 30%;
                max-width: 350px;
            }
            
            #chat-panel {
                width: 40%;
                flex: 1;
            }
            
            #profile-panel {
                width: 30%;
                max-width: 350px;
            }
            
            .mobile-nav {
                display: none;
            }
        }

        /* Мобильное отображение */
        @media (max-width: 767px) {
            #chats-panel {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 10;
                transform: translateX(0);
            }
            
            #chats-panel.hidden {
                transform: translateX(-100%);
            }
            
            #chat-panel {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 5;
            }
            
            #profile-panel {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 15;
                transform: translateX(100%);
            }
            
            #profile-panel.visible {
                transform: translateX(0);
            }
            
            .mobile-nav {
                display: flex;
            }
        }

        /* Поиск */
        .search-box {
            padding: 15px;
            background: rgba(26, 11, 46, 0.8);
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #b79aff;
            box-shadow: 0 0 20px #8a6fd0;
        }

        /* Список чатов */
        .chats-list {
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(58, 37, 99, 0.7);
            backdrop-filter: blur(5px);
            margin: 5px 0;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #6b4f9f;
        }

        .chat-item:hover {
            background: rgba(79, 55, 128, 0.8);
            transform: translateX(5px);
            box-shadow: 0 0 30px #8a6fd0;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 15px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            position: relative;
            box-shadow: 0 0 20px #8a6fd0;
        }

        .online-indicator {
            width: 14px;
            height: 14px;
            background: #00ff00;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #3a2563;
            box-shadow: 0 0 10px #00ff00;
        }

        /* Шапка чата */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(26, 11, 46, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #8a6fd0;
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            box-shadow: 0 0 15px #8a6fd0;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 80%;
            margin: 5px 0;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messageGlow 0.3s ease-out;
            border: 1px solid rgba(138, 111, 208, 0.5);
        }

        @keyframes messageGlow {
            from { 
                opacity: 0; 
                transform: translateY(10px);
                box-shadow: 0 0 0 transparent;
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
                box-shadow: 0 0 20px #8a6fd0;
            }
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(45deg, #8a6fd0, #6b4f9f);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 0 20px #8a6fd0;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(58, 37, 99, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            border-bottom-left-radius: 4px;
            border: 1px solid #b79aff;
        }

        /* Поле ввода */
        .message-input-container {
            display: flex;
            padding: 15px;
            background: rgba(26, 11, 46, 0.9);
            backdrop-filter: blur(10px);
            border-top: 2px solid #8a6fd0;
            gap: 8px;
            flex-wrap: wrap;
        }

        .attach-btn, .record-btn, .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, #4f3780, #6b4f9f);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #8a6fd0;
        }

        .attach-btn:hover, .record-btn:hover, .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #b79aff;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            min-width: 150px;
        }

        .message-input:focus {
            outline: none;
            border-color: #b79aff;
            box-shadow: 0 0 20px #8a6fd0;
        }

        /* Видео модалка */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .video-preview {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8a6fd0;
            margin: 20px;
            box-shadow: 0 0 50px #8a6fd0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="auth-screen">
            <div class="auth-container">
                <h2 class="neon-text">💜 BitTalk</h2>
                <input type="text" id="login-input" class="auth-input" placeholder="Логин" autocomplete="off">
                <input type="password" id="password-input" class="auth-input" placeholder="Пароль">
                <div id="auth-error" class="auth-error" style="color: #ff6b6b; text-align: center; margin: 10px 0; display: none;"></div>
                <button id="login-btn" class="auth-btn neon-glow">🚀 Войти</button>
                <button id="register-btn" class="auth-btn" style="background: linear-gradient(45deg, #4f3780, #6b4f9f);">✨ Регистрация</button>
            </div>
        </div>

        <!-- Модальное окно ошибки -->
        <div class="error-modal" id="error-modal">
            <div class="error-content">
                <h3>⚠️ ОШИБКА</h3>
                <p id="error-message">Нет такого пользователя с таким логином и паролем</p>
                <button class="error-btn" id="close-error">OK</button>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="main-app">
            <!-- Мобильная навигация -->
            <div class="mobile-nav">
                <button class="mobile-nav-btn active" data-panel="chats">💬 Чаты</button>
                <button class="mobile-nav-btn" data-panel="profile">👤 Профиль</button>
                <button class="mobile-nav-btn" data-panel="settings">⚙️ Настройки</button>
            </div>

            <!-- Панели -->
            <div id="panels-container">
                <!-- Список чатов -->
                <div id="chats-panel">
                    <div class="search-box">
                        <input type="text" id="user-search" class="search-input" placeholder="🔍 Поиск пользователей...">
                        <div id="search-results" class="search-results" style="display: none;"></div>
                    </div>
                    <div class="chats-list" id="chats-list">
                        <!-- Чаты будут добавляться сюда -->
                    </div>
                </div>

                <!-- Окно переписки -->
                <div id="chat-panel">
                    <div class="chat-header" id="chat-header" style="display: none;">
                        <button class="back-btn" id="back-to-chats">←</button>
                        <div class="chat-user-avatar" id="chat-avatar">👤</div>
                        <div class="chat-user-info">
                            <div class="chat-user-name" id="chat-name">Выберите чат</div>
                            <div class="chat-user-status" id="chat-status"></div>
                            <div class="typing-indicator" id="typing-indicator" style="display: none;"></div>
                        </div>
                        <button class="chat-settings-btn" id="chat-profile-btn">👤</button>
                    </div>
                    <div class="messages-container" id="messages-container">
                        <!-- Сообщения будут добавляться сюда -->
                    </div>
                    <div class="message-input-container" id="message-input-container" style="display: none;">
                        <input type="file" id="photo-upload" accept="image/*" style="display: none;">
