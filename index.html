<script type="module" src="script.js"></script>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk Pro Max | Global Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #a855f7; --bg: #0b0514; --glass: rgba(25, 12, 44, 0.8); }
        body { background: var(--bg); color: #e9d5ff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        .violet-glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.2); }
        .btn-click:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        
        /* Статусы онлайн */
        .online-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid var(--bg); position: absolute; bottom: 0; right: 0; }
        
        /* Сообщения */
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 20px; position: relative; animation: slideUp 0.2s ease-out; }
        .msg-mine { background: linear-gradient(135deg, #9333ea, #7e22ce); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-other { background: #2d1b4d; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Адаптив */
        @media (max-width: 768px) {
            #side-panel { width: 100%; height: 100%; position: absolute; z-index: 20; transition: 0.3s; }
            #chat-window { width: 100%; height: 100%; position: absolute; z-index: 10; }
            #side-panel.shifted { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div id="app" class="h-screen w-full flex overflow-hidden">
    
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#0b0514] flex items-center justify-center p-4">
        <div class="violet-glass p-8 rounded-[40px] w-full max-w-sm text-center shadow-2xl shadow-purple-900/40">
            <div class="w-20 h-20 bg-purple-600 rounded-[28px] mx-auto mb-6 flex items-center justify-center shadow-lg shadow-purple-600/30">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-3xl font-black mb-2 italic">BitTalk</h1>
            <p class="text-purple-400 text-xs mb-8 uppercase tracking-widest font-bold">Next-Gen Messaging</p>
            
            <div class="space-y-3">
                <input id="auth-login" type="text" placeholder="@username" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/20 outline-none focus:border-purple-500 transition-all text-sm">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/20 outline-none focus:border-purple-500 transition-all text-sm">
                <button id="auth-btn" class="w-full py-4 bg-purple-600 rounded-2xl font-bold btn-click shadow-lg shadow-purple-600/40">Войти / Создать</button>
            </div>
            <p id="auth-info" class="mt-4 text-[10px] text-purple-300/50 uppercase">v.5.0 Stable Release</p>
        </div>
    </div>

    <div id="side-panel" class="w-full md:w-[380px] border-r border-purple-900/30 flex flex-col violet-glass transition-all">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black tracking-tighter italic">BitTalk</h2>
                <div class="flex gap-2">
                    <button id="create-group" class="p-2 bg-purple-900/40 rounded-xl btn-click text-sm" title="Создать группу">👥</button>
                    <button id="open-settings" class="p-2 bg-purple-900/40 rounded-xl btn-click">⚙️</button>
                </div>
            </div>
            <div class="relative">
                <input id="user-search" type="text" placeholder="Поиск контактов..." class="w-full p-3 pl-10 rounded-xl bg-black/40 border border-purple-500/20 text-xs outline-none">
                <span class="absolute left-3 top-3 opacity-30 text-sm">🔍</span>
            </div>
        </div>
        <div id="chats-list" class="flex-1 overflow-y-auto px-4 space-y-2 pb-6">
            </div>
    </div>

    <div id="chat-window" class="flex-1 flex flex-col relative bg-black/40">
        <div class="p-4 violet-glass flex justify-between items-center z-10 shadow-lg">
            <div class="flex items-center gap-3">
                <button id="back-btn" class="md:hidden p-2">⬅️</button>
                <div class="relative cursor-pointer" id="view-profile">
                    <div id="header-avatar" class="w-10 h-10 bg-purple-600 rounded-[14px] flex items-center justify-center font-bold shadow-lg">?</div>
                    <div id="header-online" class="online-dot hidden"></div>
                </div>
                <div>
                    <h3 id="header-name" class="font-bold text-sm">Выберите чат</h3>
                    <p id="header-status" class="text-[9px] text-purple-400 uppercase font-black tracking-widest">не в сети</p>
                </div>
            </div>
        </div>

        <div id="messages-area" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3">
            <div class="m-auto text-center opacity-20">
                <svg class="w-20 h-20 mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                <p class="text-xs uppercase font-bold tracking-[0.2em]">Выберите диалог для общения</p>
            </div>
        </div>

        <div class="p-4 bg-black/40 border-t border-purple-900/20">
            <div class="max-w-3xl mx-auto flex items-end gap-2 bg-purple-950/20 p-2 rounded-[24px] border border-white/5">
                <button id="media-btn" class="p-3 hover:bg-white/5 rounded-full btn-click text-xl">📁</button>
                <textarea id="msg-input" rows="1" placeholder="Ваше сообщение..." class="flex-1 bg-transparent p-3 outline-none resize-none text-sm"></textarea>
                <button id="send-btn" class="p-4 bg-purple-600 rounded-2xl btn-click shadow-lg shadow-purple-600/40 transition-all">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-xl hidden flex items-center justify-center p-4">
        <div class="violet-glass w-full max-w-md rounded-[40px] p-8 flex flex-col gap-6 shadow-[0_0_80px_rgba(168,85,247,0.3)]">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold italic">Профиль</h3>
                <button id="close-settings" class="p-2 bg-white/5 rounded-full">✕</button>
            </div>
            <div class="space-y-4">
                <div class="text-center">
                    <div id="settings-avatar" class="w-20 h-20 bg-purple-600 rounded-[24px] mx-auto flex items-center justify-center text-3xl font-black mb-4">?</div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-purple-400 ml-2 tracking-widest">Ваше имя</label>
                    <input id="edit-name" type="text" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/20 outline-none focus:border-purple-500">
                </div>
                <button id="save-profile" class="w-full py-4 bg-purple-600 rounded-2xl font-bold btn-click">Сохранить</button>
                <hr class="border-purple-900/40">
                <button id="logout-btn" class="w-full py-2 text-red-400 text-xs font-bold uppercase tracking-widest">Выйти из аккаунта</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaCtnz5ZJPJtq04Xm24dw5xc7QPZUHue",
        authDomain: "bittalk-e6df4.firebaseapp.com",
        databaseURL: "https://bittalk-e6df4-default-rtdb.firebaseio.com",
        projectId: "bittalk-e6df4",
        storageBucket: "bittalk-e6df4.firebasestorage.app",
        messagingSenderId: "1083926758846",
        appId: "1:1083926758846:web:51032b148e48556bca25ef"
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    
    let user = JSON.parse(localStorage.getItem('bt_pmax_user')) || null;
    let activeChatId = null;
    let currentRoomId = null;
    let chatListeners = [];

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function init() {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('edit-name').value = user.name;
            document.getElementById('settings-avatar').innerText = user.name[0];
            updateOnlineStatus(true);
            renderChatsList();
        }
    }

    // --- АВТОРИЗАЦИЯ ---
    document.getElementById('auth-btn').addEventListener('click', () => {
        const login = document.getElementById('auth-login').value.trim().replace('@', '');
        const pass = document.getElementById('auth-pass').value.trim();
        if(!login || !pass) return alert("Введите данные");

        onValue(ref(db, `users/${login}`), (s) => {
            const data = s.val();
            if (data) {
                if(data.pass === pass) { user = data; proceedLogin(); }
                else alert("Неверный пароль");
            } else {
                const newUser = { login, pass, name: login, avatar: '', lastSeen: serverTimestamp() };
                set(ref(db, `users/${login}`), newUser);
                user = newUser; proceedLogin();
            }
        }, { onlyOnce: true });
    });

    function proceedLogin() {
        localStorage.setItem('bt_pmax_user', JSON.stringify(user));
        location.reload();
    }

    // --- СПИСОК ЧАТОВ ---
    function renderChatsList() {
        onValue(ref(db, 'users'), (s) => {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            const users = s.val();
            for (let id in users) {
                if (id === user.login) continue;
                const u = users[id];
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-4 rounded-2xl cursor-pointer hover:bg-purple-600/10 transition-all border border-transparent hover:border-purple-500/20";
                div.innerHTML = `
                    <div class="relative">
                        <div class="w-12 h-12 bg-purple-600 rounded-[16px] flex items-center justify-center font-bold shadow-lg">${u.name[0]}</div>
                        ${u.isOnline ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-baseline">
                            <span class="font-bold text-sm">@${id}</span>
                            <span class="text-[9px] opacity-40">${u.isOnline ? 'online' : 'off'}</span>
                        </div>
                        <p class="text-[10px] text-purple-400 truncate">${u.name}</p>
                    </div>
                `;
                div.onclick = () => openChat(id, u.name);
                list.appendChild(div);
            }
        });
    }

    // --- ОТКРЫТИЕ ЧАТА ---
    function openChat(targetId, targetName) {
        activeChatId = targetId;
        currentRoomId = [user.login, targetId].sort().join('_');
        
        document.getElementById('header-name').innerText = `@${targetId}`;
        document.getElementById('header-avatar').innerText = targetId[0].toUpperCase();
        document.getElementById('messages-area').innerHTML = '';
        
        if(window.innerWidth < 768) {
            document.getElementById('side-panel').classList.add('shifted');
        }

        // Слушаем сообщения в этой комнате
        const roomRef = ref(db, `rooms/${currentRoomId}`);
        onChildAdded(roomRef, (s) => {
            renderMessage(s.val());
        });
    }

    function renderMessage(msg) {
        const area = document.getElementById('messages-area');
        const isMine = msg.sender === user.login;
        
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
        div.innerHTML = `
            <p class="text-sm leading-relaxed">${msg.text}</p>
            <div class="flex items-center justify-end gap-1 mt-1">
                <span class="text-[8px] opacity-60">${msg.time}</span>
                ${isMine ? '<span class="text-[10px]">✓✓</span>' : ''}
            </div>
        `;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // --- ОТПРАВКА ---
    document.getElementById('send-btn').addEventListener('click', () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !currentRoomId) return;

        const msgData = {
            sender: user.login,
            text: input.value.trim(),
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            timestamp: serverTimestamp()
        };

        push(ref(db, `rooms/${currentRoomId}`), msgData);
        input.value = '';
        input.style.height = 'auto';
    });

    // --- ФУНКЦИИ ИНТЕРФЕЙСА ---
    document.getElementById('back-btn').onclick = () => document.getElementById('side-panel').classList.remove('shifted');
    document.getElementById('open-settings').onclick = () => document.getElementById('settings-modal').classList.remove('hidden');
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-modal').classList.add('hidden');
    
    document.getElementById('save-profile').onclick = () => {
        const name = document.getElementById('edit-name').value.trim();
        if(!name) return;
        user.name = name;
        update(ref(db, `users/${user.login}`), { name: name });
        localStorage.setItem('bt_pmax_user', JSON.stringify(user));
        alert("Профиль сохранен!");
    };

    document.getElementById('logout-btn').onclick = () => {
        updateOnlineStatus(false);
        localStorage.clear();
        location.reload();
    };

    function updateOnlineStatus(status) {
        if(!user) return;
        update(ref(db, `users/${user.login}`), { isOnline: status, lastSeen: serverTimestamp() });
    }

    // Авто-высота textarea
    document.getElementById('msg-input').oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    };

    // Чтобы пользователь "уходил в офлайн" при закрытии вкладки
    window.addEventListener('beforeunload', () => updateOnlineStatus(false));

    init();
</script>
</body>
                </html>
