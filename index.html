<script type="module" src="script.js"></script>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk Ultimate | Private Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #a855f7; --bg: #0f071a; --glass: rgba(30, 15, 50, 0.7); }
        body { background-color: var(--bg); color: #e9d5ff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: manipulation; }
        .violet-glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(168, 85, 247, 0.3); }
        .btn-active:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        
        /* Видео-кружки */
        .video-circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); background: #000; }
        .msg-video { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            #side-panel { width: 100%; position: absolute; z-index: 20; }
            #chat-window { width: 100%; position: absolute; z-index: 10; }
            #chat-window.active { z-index: 30; }
        }

        /* Анимация сообщений */
        .msg-anim { animation: msgIn 0.3s ease-out forwards; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-screen" class="h-screen w-full flex items-center justify-center p-4">
        <div class="violet-glass p-8 rounded-[40px] w-full max-w-sm text-center shadow-[0_0_50px_rgba(168,85,247,0.2)]">
            <div class="mb-6 inline-block p-5 bg-purple-600 rounded-[24px] shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-3xl font-black mb-6 tracking-tighter">BitTalk <span class="text-purple-400">V.4</span></h1>
            <input id="auth-login" type="text" placeholder="@username" class="w-full mb-3 p-4 rounded-2xl bg-black/40 border border-purple-500/30 outline-none focus:border-purple-500 transition-all">
            <input id="auth-pass" type="password" placeholder="Пароль" class="w-full mb-6 p-4 rounded-2xl bg-black/40 border border-purple-500/30 outline-none focus:border-purple-500 transition-all">
            <button id="login-btn" class="w-full py-4 bg-purple-600 rounded-2xl font-bold btn-active shadow-lg shadow-purple-600/30">Войти / Регистрация</button>
            <p id="auth-status" class="mt-4 text-xs text-purple-300 opacity-70"></p>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden">
        <div id="side-panel" class="h-full border-r border-purple-900/30 flex flex-col violet-glass">
            <div class="p-6 flex justify-between items-center">
                <h2 class="text-2xl font-black text-purple-400">Чаты</h2>
                <button id="open-settings" class="p-2 bg-purple-900/40 rounded-xl btn-active">⚙️</button>
            </div>
            <div class="px-6 mb-4">
                <input id="user-search" type="text" placeholder="Поиск @юзеров..." class="w-full p-3 rounded-xl bg-black/40 border border-purple-500/20 text-sm outline-none">
            </div>
            <div id="chats-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
        </div>

        <div id="chat-window" class="h-full flex-1 flex flex-col bg-black/20 transition-all">
            <div class="p-4 violet-glass flex items-center gap-4">
                <button id="back-btn" class="md:hidden text-2xl">←</button>
                <div id="chat-header-avatar" class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center font-bold">?</div>
                <div>
                    <h3 id="chat-title" class="font-bold">Выберите чат</h3>
                    <p class="text-[10px] text-purple-400 uppercase tracking-widest">online</p>
                </div>
            </div>

            <div id="messages-area" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>

            <div class="p-4 bg-black/40 border-t border-purple-900/20">
                <div id="recording-status" class="hidden text-center text-red-500 text-xs mb-2 animate-pulse">● Идет запись...</div>
                <div class="max-w-4xl mx-auto flex items-end gap-2">
                    <div class="flex gap-1">
                        <button id="voice-btn" class="p-3 bg-purple-900/40 rounded-full btn-active text-xl">🎤</button>
                        <button id="video-btn" class="p-3 bg-purple-900/40 rounded-full btn-active text-xl">🎥</button>
                    </div>
                    <textarea id="msg-input" rows="1" placeholder="Сообщение..." class="flex-1 bg-white/5 p-3 rounded-2xl outline-none border border-purple-500/20 resize-none text-sm"></textarea>
                    <button id="send-btn" class="p-4 bg-purple-600 rounded-2xl btn-active shadow-lg shadow-purple-600/30">
                        <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                <center><video id="record-preview" class="video-circle mt-4 hidden" autoplay muted playsinline></video></center>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl hidden flex items-center justify-center p-4">
        <div class="violet-glass w-full max-w-md rounded-[40px] p-8 flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Профиль</h3>
                <button id="close-settings" class="text-2xl">✕</button>
            </div>
            <div class="space-y-4">
                <input id="edit-name" type="text" placeholder="Ваше имя" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/30 outline-none">
                <button id="save-profile" class="w-full py-4 bg-purple-600 rounded-2xl font-bold btn-active">Сохранить</button>
                <hr class="border-purple-900/50">
                <button id="sigma-panel-btn" class="w-full py-4 border border-amber-500 text-amber-500 rounded-2xl font-black italic">⚡ SIGMA PANEL</button>
                <div id="sigma-auth" class="hidden space-y-2">
                    <input id="sigma-pass" type="password" placeholder="Master Key" class="w-full p-3 rounded-xl bg-red-900/20 border border-red-500 outline-none text-center">
                    <button id="sigma-unlock" class="w-full py-2 bg-red-600 rounded-lg text-xs font-bold uppercase">Unlock Database</button>
                </div>
                <div id="sigma-list" class="hidden max-h-40 overflow-y-auto space-y-2"></div>
                <button id="logout-btn" class="w-full py-2 text-gray-500 text-xs">Выйти</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaCtnz5ZJPJtq04Xm24dw5xc7QPZUHue",
        authDomain: "bittalk-e6df4.firebaseapp.com",
        databaseURL: "https://bittalk-e6df4-default-rtdb.firebaseio.com",
        projectId: "bittalk-e6df4",
        storageBucket: "bittalk-e6df4.firebasestorage.app",
        messagingSenderId: "1083926758846",
        appId: "1:1083926758846:web:51032b148e48556bca25ef"
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    
    let user = JSON.parse(localStorage.getItem('bt_user')) || null;
    let activeChat = null;
    let mediaRecorder = null;
    let chunks = [];

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function init() {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderChats();
        }
    }

    // --- ОБРАБОТЧИКИ СОБЫТИЙ (CLICK) ---
    document.addEventListener('click', async (e) => {
        const id = e.target.id;

        if (id === 'login-btn') handleAuth();
        if (id === 'send-btn') sendMsg();
        if (id === 'back-btn') toggleMobileChat(false);
        if (id === 'open-settings') document.getElementById('settings-modal').classList.remove('hidden');
        if (id === 'close-settings') document.getElementById('settings-modal').classList.add('hidden');
        if (id === 'save-profile') saveProfile();
        if (id === 'logout-btn') { localStorage.clear(); location.reload(); }
        if (id === 'sigma-panel-btn') document.getElementById('sigma-auth').classList.toggle('hidden');
        if (id === 'sigma-unlock') handleSigma();
        
        // Медиа кнопки
        if (id === 'voice-btn') startMediaRecord('audio');
        if (id === 'video-btn') startMediaRecord('video');
    });

    // --- АВТОРИЗАЦИЯ ---
    async function handleAuth() {
        const login = document.getElementById('auth-login').value.trim().replace('@', '');
        const pass = document.getElementById('auth-pass').value.trim();
        if (!login || !pass) return;

        onValue(ref(db, `users/${login}`), (s) => {
            const data = s.val();
            if (data) {
                if (data.pass === pass) { user = data; proceedAuth(); }
                else { alert("Неверный пароль"); }
            } else {
                const newUser = { login, pass, name: login, avatar: '' };
                set(ref(db, `users/${login}`), newUser);
                user = newUser; proceedAuth();
            }
        }, { onlyOnce: true });
    }

    function proceedAuth() {
        localStorage.setItem('bt_user', JSON.stringify(user));
        location.reload();
    }

    // --- ЧАТЫ ---
    function renderChats() {
        onValue(ref(db, 'users'), (s) => {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            const users = s.val();
            for (let id in users) {
                if (id === user.login) continue;
                const u = users[id];
                const div = document.createElement('div');
                div.className = "p-4 flex items-center gap-3 cursor-pointer hover:bg-purple-500/10 rounded-2xl transition-all mb-1";
                div.innerHTML = `<div class="w-12 h-12 bg-purple-600 rounded-xl flex items-center justify-center font-bold">${u.name[0]}</div>
                                 <div class="flex-1"><b>@${id}</b><p class="text-[10px] text-gray-500">${u.name}</p></div>`;
                div.onclick = () => openChat(id, u.name);
                list.appendChild(div);
            }
        });
    }

    function openChat(targetId, targetName) {
        activeChat = targetId;
        document.getElementById('chat-title').innerText = `@${targetId}`;
        document.getElementById('chat-header-avatar').innerText = targetId[0].toUpperCase();
        document.getElementById('messages-area').innerHTML = '';
        toggleMobileChat(true);

        const roomId = [user.login, targetId].sort().join('_');
        onChildAdded(ref(db, `rooms/${roomId}`), (s) => {
            renderMessage(s.val());
        });
    }

    function toggleMobileChat(show) {
        if (show) document.getElementById('chat-window').classList.add('active');
        else document.getElementById('chat-window').classList.remove('active');
    }

    // --- СООБЩЕНИЯ ---
    function sendMsg(mediaData = null, type = 'text') {
        const input = document.getElementById('msg-input');
        if (!mediaData && !input.value.trim()) return;
        if (!activeChat) return alert("Выберите чат");

        const roomId = [user.login, activeChat].sort().join('_');
        push(ref(db, `rooms/${roomId}`), {
            sender: user.login,
            text: mediaData || input.value,
            type: type,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        input.value = '';
        document.getElementById('record-preview').classList.add('hidden');
    }

    function renderMessage(msg) {
        const area = document.getElementById('messages-area');
        const isMine = msg.sender === user.login;
        const div = document.createElement('div');
        div.className = `max-w-[80%] p-3 rounded-2xl msg-anim ${isMine ? 'bg-purple-600 self-end rounded-tr-none' : 'bg-white/10 self-start rounded-tl-none'}`;
        
        if (msg.type === 'video') {
            div.innerHTML = `<video src="${msg.text}" class="msg-video" controls></video>`;
        } else if (msg.type === 'audio') {
            div.innerHTML = `<audio src="${msg.text}" controls class="max-w-full"></audio>`;
        } else {
            div.innerHTML = `<p class="text-sm">${msg.text}</p>`;
        }
        
        div.innerHTML += `<span class="text-[8px] opacity-50 block text-right mt-1">${msg.time}</span>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // --- ЗАПИСЬ МЕДИА (КРУЖКИ И ГОЛОС) ---
    async function startMediaRecord(type) {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            document.getElementById('recording-status').classList.add('hidden');
            return;
        }

        const constraints = { audio: true, video: type === 'video' };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            if (type === 'video') {
                const preview = document.getElementById('record-preview');
                preview.srcObject = stream;
                preview.classList.remove('hidden');
            }
            
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: type === 'video' ? 'video/webm' : 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => sendMsg(reader.result, type);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            document.getElementById('recording-status').classList.remove('hidden');
        } catch (err) {
            alert("Нет доступа к камере/микрофону");
        }
    }

    // --- СИГМА ПАНЕЛЬ ---
    function handleSigma() {
        const key = document.getElementById('sigma-pass').value;
        if (key === "1234567891011121314151617181920") {
            document.getElementById('sigma-list').classList.remove('hidden');
            onValue(ref(db, 'users'), (s) => {
                const list = document.getElementById('sigma-list');
                list.innerHTML = '<p class="text-[10px] text-amber-500 mb-2">DB ACCESS GRANTED</p>';
                const users = s.val();
                for (let id in users) {
                    list.innerHTML += `<div class="flex justify-between items-center bg-black/40 p-2 rounded-lg text-[10px]">
                        <span>@${id}</span>
                        <button onclick="window.sigmaDel('${id}')" class="text-red-500">DELETE</button>
                    </div>`;
                }
            });
        } else { alert("ACCESS DENIED"); }
    }

    window.sigmaDel = (id) => { if(confirm(`Удалить ${id}?`)) remove(ref(db, `users/${id}`)); };

    function saveProfile() {
        const name = document.getElementById('edit-name').value;
        if (!name) return;
        user.name = name;
        set(ref(db, `users/${user.login}`), user);
        localStorage.setItem('bt_user', JSON.stringify(user));
        alert("Обновлено!");
    }

    init();
</script>
</body>
                    </html>
