<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk 💜 Фиолетовый мессенджер</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #1a0b2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            background: #2d1b4a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Экран входа */
        #auth-screen {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2d1b4a, #1a0b2e);
        }

        .auth-container {
            background: #3a2563;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .auth-container h2 {
            color: #b79aff;
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2d1b4a;
            border: 2px solid #6b4f9f;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }

        .auth-input::placeholder {
            color: #9a8bb8;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: #8a6fd0;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: background 0.3s;
        }

        .auth-btn:hover {
            background: #9f87e6;
        }

        .auth-error {
            color: #ff6b6b;
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        .auth-switch {
            color: #b79aff;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
        }

        .auth-switch:hover {
            text-decoration: underline;
        }

        /* Основной интерфейс */
        #main-app {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        /* Мобильная навигация */
        .mobile-nav {
            display: flex;
            background: #1a0b2e;
            padding: 10px;
            gap: 10px;
            border-bottom: 2px solid #6b4f9f;
        }

        .mobile-nav-btn {
            flex: 1;
            padding: 12px;
            background: #2d1b4a;
            border: none;
            border-radius: 25px;
            color: #b79aff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .mobile-nav-btn.active {
            background: #8a6fd0;
            color: white;
        }

        /* Контейнер с тремя панелями */
        #panels-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Панель чатов */
        #chats-panel {
            width: 100%;
            background: #2d1b4a;
            border-right: 2px solid #6b4f9f;
            overflow-y: auto;
            transition: 0.3s;
        }

        /* Панель переписки */
        #chat-panel {
            width: 100%;
            background: #2d1b4a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Панель профиля */
        #profile-panel {
            width: 100%;
            background: #2d1b4a;
            border-left: 2px solid #6b4f9f;
            overflow-y: auto;
        }

        /* Десктопное отображение */
        @media (min-width: 768px) {
            #panels-container {
                display: flex;
            }
            
            #chats-panel {
                width: 30%;
                max-width: 350px;
            }
            
            #chat-panel {
                width: 40%;
                flex: 1;
            }
            
            #profile-panel {
                width: 30%;
                max-width: 350px;
            }
            
            .mobile-nav {
                display: none;
            }
        }

        /* Мобильное отображение */
        @media (max-width: 767px) {
            #chats-panel {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 10;
                transform: translateX(0);
            }
            
            #chats-panel.hidden {
                transform: translateX(-100%);
            }
            
            #chat-panel {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 5;
            }
            
            #profile-panel {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 15;
                transform: translateX(100%);
            }
            
            #profile-panel.visible {
                transform: translateX(0);
            }
            
            .mobile-nav {
                display: flex;
            }
        }

        /* Поиск */
        .search-box {
            padding: 15px;
            background: #1a0b2e;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: #2d1b4a;
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 16px;
        }

        /* Список чатов */
        .chats-list {
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #3a2563;
            margin: 5px 0;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .chat-item:hover {
            background: #4f3780;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #8a6fd0;
            border-radius: 15px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            position: relative;
        }

        .online-indicator {
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #3a2563;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .chat-last {
            color: #b79aff;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .unread-badge {
            background: #8a6fd0;
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            padding: 0 5px;
            margin-left: 10px;
        }

        /* Шапка чата */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #1a0b2e;
            border-bottom: 2px solid #6b4f9f;
        }

        .back-btn {
            background: none;
            border: none;
            color: #b79aff;
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
            display: none;
        }

        @media (max-width: 767px) {
            .back-btn {
                display: block;
            }
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            background: #8a6fd0;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        .chat-user-info {
            flex: 1;
        }

        .chat-user-name {
            color: white;
            font-weight: bold;
        }

        .chat-user-status {
            color: #b79aff;
            font-size: 12px;
        }

        .typing-indicator {
            color: #8a6fd0;
            font-size: 12px;
            font-style: italic;
        }

        .chat-settings-btn {
            background: none;
            border: none;
            color: #b79aff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 80%;
            margin: 5px 0;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            background: #8a6fd0;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: #3a2563;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
            text-align: right;
        }

        .message-status {
            font-size: 11px;
            margin-left: 5px;
        }

        /* Медиа сообщения */
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px 0;
        }

        .message-video-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #8a6fd0;
        }

        .audio-message {
            background: #2d1b4a;
            border-radius: 25px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .audio-play-btn {
            width: 40px;
            height: 40px;
            background: #8a6fd0;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-wave {
            flex: 1;
            height: 30px;
            background: linear-gradient(90deg, #b79aff 0%, #8a6fd0 100%);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .audio-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #6b4f9f;
            width: 0%;
        }

        .audio-time {
            color: white;
            font-size: 12px;
            min-width: 35px;
        }

        /* Поле ввода */
        .message-input-container {
            display: flex;
            padding: 15px;
            background: #1a0b2e;
            border-top: 2px solid #6b4f9f;
            gap: 8px;
            flex-wrap: wrap;
        }

        .attach-btn {
            width: 45px;
            height: 45px;
            background: #4f3780;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .attach-btn:hover {
            background: #6b4f9f;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            background: #2d1b4a;
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            min-width: 150px;
        }

        .record-btn {
            width: 45px;
            height: 45px;
            background: #ff6b6b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .record-btn.recording {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: #8a6fd0;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #9f87e6;
        }

        /* Модальное окно записи видео */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .video-preview {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8a6fd0;
            margin: 20px;
        }

        .video-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .record-controls {
            display: flex;
            gap: 20px;
            margin: 20px;
        }

        .record-control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .start-record {
            background: #ff6b6b;
            color: white;
        }

        .stop-record {
            background: #8a6fd0;
            color: white;
            display: none;
        }

        .close-record {
            background: #4f3780;
            color: white;
        }

        /* Настройки */
        .settings-container {
            padding: 20px;
        }

        .settings-title {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .settings-section {
            background: #3a2563;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .settings-item {
            margin: 15px 0;
        }

        .settings-label {
            color: #b79aff;
            margin-bottom: 5px;
            display: block;
        }

        .settings-input {
            width: 100%;
            padding: 12px;
            background: #2d1b4a;
            border: 2px solid #6b4f9f;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .settings-avatar {
            width: 100px;
            height: 100px;
            background: #8a6fd0;
            border-radius: 20px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .settings-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: 0.3s;
        }

        .settings-avatar:hover .avatar-overlay {
            opacity: 1;
        }

        .settings-btn {
            padding: 12px 25px;
            background: #8a6fd0;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .delete-btn {
            background: #ff6b6b;
        }

        /* Поиск пользователей */
        .search-results {
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .user-result {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #3a2563;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }

        .user-result:hover {
            background: #4f3780;
        }

        .user-result-avatar {
            width: 40px;
            height: 40px;
            background: #8a6fd0;
            border-radius: 12px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="auth-screen">
            <div class="auth-container">
                <h2>💜 BitTalk</h2>
                <input type="text" id="login-input" class="auth-input" placeholder="Логин" autocomplete="off">
                <input type="password" id="password-input" class="auth-input" placeholder="Пароль">
                <div id="auth-error" class="auth-error"></div>
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn" style="background: #4f3780;">Регистрация</button>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="main-app">
            <!-- Мобильная навигация -->
            <div class="mobile-nav">
                <button class="mobile-nav-btn active" data-panel="chats">Чаты</button>
                <button class="mobile-nav-btn" data-panel="profile">Профиль</button>
