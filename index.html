<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk 💜 НЕОНОВЫЙ МЕССЕНДЖЕР</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #8a2be2;
            border: 1px solid #8a2be2;
        }

        /* НЕОНОВЫЕ ЭФФЕКТЫ */
        .neon-text {
            text-shadow: 0 0 5px #b79aff, 0 0 10px #8a6fd0, 0 0 20px #6b4f9f;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #8a6fd0, 0 0 10px #6b4f9f; }
            50% { box-shadow: 0 0 15px #b79aff, 0 0 30px #8a6fd0; }
            100% { box-shadow: 0 0 5px #8a6fd0, 0 0 10px #6b4f9f; }
        }

        /* Экран входа */
        #auth-screen {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a0b2e, #0a0a0f);
        }

        .auth-container {
            background: rgba(26, 11, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #8a6fd0;
            box-shadow: 0 0 30px #8a6fd0;
            animation: neonPulse 3s infinite;
        }

        .auth-container h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 10px #b79aff;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(45, 27, 74, 0.9);
            border: 2px solid #6b4f9f;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #b79aff;
            box-shadow: 0 0 20px #8a6fd0;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px #8a6fd0;
        }

        /* МОДАЛЬНОЕ ОКНО ОШИБКИ */
        .error-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .error-modal.active {
            display: flex;
        }

        .error-content {
            background: #1a0b2e;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 50px #ff6b6b;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .error-content h3 {
            color: #ff6b6b;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .error-content p {
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .error-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff4444);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Основной интерфейс (упрощенный для теста) */
        #main-app {
            display: none;
            height: 100%;
            padding: 20px;
            color: white;
        }

        .test-panel {
            background: rgba(26, 11, 46, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #8a6fd0;
            text-align: center;
        }

        .test-panel h1 {
            color: #b79aff;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .test-panel p {
            color: white;
            margin: 10px 0;
            font-size: 18px;
        }

        .logout-btn {
            background: #ff6b6b;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="auth-screen">
            <div class="auth-container">
                <h2 class="neon-text">💜 BitTalk</h2>
                <input type="text" id="login-input" class="auth-input" placeholder="Логин" value="admin" autocomplete="off">
                <input type="password" id="password-input" class="auth-input" placeholder="Пароль" value="admin" autocomplete="off">
                <div id="auth-error" style="color: #ff6b6b; text-align: center; margin: 10px 0; display: none;"></div>
                <button id="login-btn" class="auth-btn">🚀 Войти</button>
                <button id="register-btn" class="auth-btn" style="background: linear-gradient(45deg, #4f3780, #6b4f9f);">✨ Регистрация</button>
                
                <!-- Тестовые аккаунты -->
                <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                    <p style="color: #b79aff; margin-bottom: 5px;">📋 Тестовые аккаунты:</p>
                    <p style="color: white;">admin / admin</p>
                    <p style="color: white;">user / user</p>
                    <p style="color: white;">test / 123</p>
                </div>
            </div>
        </div>

        <!-- Модальное окно ошибки -->
        <div class="error-modal" id="error-modal">
            <div class="error-content">
                <h3>⚠️ ОШИБКА</h3>
                <p id="error-message">Нет такого пользователя с таким логином и паролем</p>
                <button class="error-btn" id="close-error">OK</button>
            </div>
        </div>

        <!-- Основное приложение (тестовая заглушка) -->
        <div id="main-app">
            <div style="height: 100%; display: flex; justify-content: center; align-items: center;">
                <div class="test-panel">
                    <h1>💜 Добро пожаловать в BitTalk!</h1>
                    <p id="welcome-user"></p>
                    <p>✅ Вы успешно вошли в систему</p>
                    <p>✨ Здесь будет полный интерфейс мессенджера</p>
                    <button class="logout-btn" id="test-logout">Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== ЛОКАЛЬНАЯ БАЗА ДАННЫХ (не требует Firebase) ==========
        const LOCAL_USERS_KEY = 'bittalk_users';
        
        // База пользователей (в памяти)
        let users = [];
        
        // Загружаем пользователей из localStorage или создаем тестовых
        function loadUsers() {
            const saved = localStorage.getItem(LOCAL_USERS_KEY);
            if (saved) {
                users = JSON.parse(saved);
            } else {
                // Тестовые пользователи
                users = [
                    {
                        id: '1',
                        login: 'admin',
                        password: 'admin',
                        name: 'Админ',
                        username: '@admin',
                        bio: 'Главный администратор'
                    },
                    {
                        id: '2',
                        login: 'user',
                        password: 'user',
                        name: 'Пользователь',
                        username: '@user',
                        bio: 'Обычный пользователь'
                    },
                    {
                        id: '3',
                        login: 'test',
                        password: '123',
                        name: 'Тест',
                        username: '@test',
                        bio: 'Тестовый аккаунт'
                    }
                ];
                saveUsers();
            }
        }
        
        function saveUsers() {
            localStorage.setItem(LOCAL_USERS_KEY, JSON.stringify(users));
        }
        
        // Инициализируем базу
        loadUsers();

        // ========== ЭЛЕМЕНТЫ DOM ==========
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const loginInput = document.getElementById('login-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authError = document.getElementById('auth-error');
        const welcomeUser = document.getElementById('welcome-user');
        
        // Модальное окно ошибки
        const errorModal = document.getElementById('error-modal');
        const errorMessage = document.getElementById('error-message');
        const closeError = document.getElementById('close-error');

        // ========== ФУНКЦИИ ==========
        function showError(msg) {
            errorMessage.textContent = msg;
            errorModal.classList.add('active');
        }

        closeError.addEventListener('click', () => {
            errorModal.classList.remove('active');
        });

        // Проверка существования пользователя
        function findUser(login, password) {
            return users.find(u => u.login === login && u.password === password);
        }

        function findUserByLogin(login) {
            return users.find(u => u.login === login);
        }

        // ========== ВХОД ==========
        loginBtn.addEventListener('click', () => {
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();
            
            console.log('Попытка входа:', login, password);
            
            if (!login || !password) {
                showError('❌ Заполните все поля!');
                return;
            }
            
            const user = findUser(login, password);
            
            if (user) {
                console.log('Успешный вход:', user);
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                welcomeUser.textContent = `👤 ${user.name} (${user.username})`;
                
                // Очищаем поля
                loginInput.value = '';
                passwordInput.value = '';
            } else {
                console.log('Пользователь не найден');
                showError('❌ Нет такого пользователя с таким логином и паролем');
            }
        });

        // ========== РЕГИСТРАЦИЯ ==========
        registerBtn.addEventListener('click', () => {
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();
            
            console.log('Попытка регистрации:', login, password);
            
            if (!login || !password) {
                showError('❌ Заполните все поля');
                return;
            }
            
            if (login.length < 3) {
                showError('❌ Логин должен быть не менее 3 символов');
                return;
            }
            
            if (password.length < 3) {
                showError('❌ Пароль должен быть не менее 3 символов');
                return;
            }
            
            // Проверяем, существует ли пользователь
            const existingUser = findUserByLogin(login);
            
            if (existingUser) {
                showError('❌ Пользователь с таким логином уже существует');
                return;
            }
            
            // Создаем нового пользователя
            const newUser = {
                id: Date.now().toString(),
                login: login,
                password: password,
                name: login,
                username: '@' + login,
                bio: ''
            };
            
            users.push(newUser);
            saveUsers();
            
            console.log('Новый пользователь создан:', newUser);
            
            // Автоматически входим
            authScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            welcomeUser.textContent = `👤 ${newUser.name} (${newUser.username})`;
            
            loginInput.value = '';
            passwordInput.value = '';
        });

        // ========== ВЫХОД ==========
        const testLogout = document.getElementById('test-logout');
        if (testLogout) {
            testLogout.addEventListener('click', () => {
                mainApp.style.display = 'none';
                authScreen.style.display = 'flex';
            });
        }

        // ========== ТЕСТИРОВАНИЕ ==========
        console.log('✅ Система готова. Тестовые пользователи:', users);
    </script>
</body>
</html>
