<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk 💜 РАБОЧАЯ ВЕРСИЯ</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            border: 1px solid #8a2be2;
        }

        /* ЭКРАН ВХОДА */
        #auth-screen {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a0b2e;
        }

        .auth-box {
            background: #2d1b4a;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #8a6fd0;
        }

        .auth-box h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .auth-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1a0b2e;
            border: 2px solid #6b4f9f;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        .auth-box button {
            width: 100%;
            padding: 15px;
            background: #8a6fd0;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
        }

        .auth-box button:hover {
            background: #9f87e6;
        }

        #register-btn {
            background: #4f3780;
        }

        #auth-error {
            color: #ff6b6b;
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        /* ОСНОВНОЙ ЧАТ */
        #main-app {
            display: none;
            height: 100%;
            flex-direction: column;
            background: #0f0f1a;
        }

        .header {
            background: #1a0b2e;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #8a6fd0;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            flex: 1;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            background: #8a6fd0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .chat-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #1a0b2e;
            border-right: 2px solid #8a6fd0;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }

        .chat-header {
            padding: 15px 20px;
            background: #1a0b2e;
            border-bottom: 2px solid #8a6fd0;
            display: none;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .chat-input-area {
            padding: 20px;
            background: #1a0b2e;
            border-top: 2px solid #8a6fd0;
            display: none;
        }

        .chat-input {
            width: 100%;
            padding: 15px;
            background: #2d1b4a;
            border: 2px solid #6b4f9f;
            border-radius: 10px;
            color: white;
        }

        .profile-panel {
            width: 300px;
            background: #1a0b2e;
            border-left: 2px solid #8a6fd0;
            padding: 20px;
            overflow-y: auto;
        }

        .profile-section {
            background: #2d1b4a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .profile-section h3 {
            color: white;
            margin-bottom: 15px;
        }

        .profile-input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #1a0b2e;
            border: 2px solid #6b4f9f;
            border-radius: 5px;
            color: white;
        }

        .profile-btn {
            width: 100%;
            padding: 10px;
            background: #8a6fd0;
            border: none;
            border-radius: 5px;
            color: white;
            margin: 5px 0;
            cursor: pointer;
        }

        #logout-btn {
            background: #ff6b6b;
        }

        .chat-item {
            padding: 10px;
            margin: 5px 0;
            background: #2d1b4a;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .chat-item:hover {
            background: #4f3780;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .my-message {
            background: #8a6fd0;
            margin-left: auto;
            color: white;
        }

        .other-message {
            background: #2d1b4a;
            color: white;
        }

        /* Модальное окно ошибки */
        .error-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .error-modal.show {
            display: flex;
        }

        .error-content {
            background: #1a0b2e;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #ff6b6b;
            text-align: center;
            max-width: 400px;
        }

        .error-content button {
            background: #ff6b6b;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ЭКРАН ВХОДА -->
        <div id="auth-screen">
            <div class="auth-box">
                <h2>💜 BitTalk</h2>
                <input type="text" id="login" placeholder="Логин" value="admin">
                <input type="password" id="password" placeholder="Пароль" value="admin">
                <div id="auth-error">Неверный логин или пароль</div>
                <button id="login-btn">🚀 Войти</button>
                <button id="register-btn">✨ Регистрация</button>
                
                <div style="margin-top: 20px; color: #b79aff; font-size: 14px;">
                    Тестовые: admin/admin, user/user, test/123
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ОШИБКИ -->
        <div class="error-modal" id="error-modal">
            <div class="error-content">
                <h3 style="color: #ff6b6b;">⚠️ ОШИБКА</h3>
                <p id="error-text" style="color: white; margin: 20px 0;"></p>
                <button id="close-error">OK</button>
            </div>
        </div>

        <!-- ОСНОВНОЙ ЧАТ -->
        <div id="main-app">
            <div class="header">
                <h1>💜 BitTalk</h1>
                <div class="header-avatar" id="header-avatar">👤</div>
            </div>

            <div class="chat-layout">
                <!-- Список чатов -->
                <div class="sidebar">
                    <div id="chats-list"></div>
                    <button class="profile-btn" id="create-group" style="margin-top: 10px;">➕ Создать группу</button>
                </div>

                <!-- Область чата -->
                <div class="chat-area">
                    <div class="chat-header" id="chat-header">
                        <span id="current-chat-name">Общий чат</span>
                    </div>
                    <div class="chat-messages" id="messages"></div>
                    <div class="chat-input-area" id="chat-input-area">
                        <input type="text" class="chat-input" id="message-input" placeholder="Сообщение...">
                    </div>
                </div>

                <!-- Профиль -->
                <div class="profile-panel">
                    <div class="profile-section">
                        <h3>👤 Мой профиль</h3>
                        <div class="profile-avatar" style="width:80px;height:80px;background:#8a6fd0;border-radius:50%;margin:10px auto;display:flex;align-items:center;justify-content:center;font-size:40px;" id="profile-avatar">👤</div>
                        
                        <input type="text" class="profile-input" id="profile-name" placeholder="Имя">
                        <input type="text" class="profile-input" id="profile-username" placeholder="Юзернейм">
                        <input type="text" class="profile-input" id="profile-bio" placeholder="О себе">
                        
                        <button class="profile-btn" id="save-profile">💾 Сохранить</button>
                    </div>

                    <div class="profile-section">
                        <h3>⚙️ Настройки</h3>
                        <button class="profile-btn" id="sigma-btn">⚡ Сигма панель</button>
                        <button class="profile-btn" id="logout-btn">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- СИГМА ПАНЕЛЬ -->
    <div class="error-modal" id="sigma-modal">
        <div class="error-content" style="border-color: #ff00ff;">
            <h3 style="color: #ff00ff;">🔐 СИГМА ПАНЕЛЬ</h3>
            <input type="password" id="sigma-password" class="profile-input" placeholder="Пароль" style="margin:20px 0;">
            <button class="profile-btn" id="sigma-submit">Войти</button>
            <div id="sigma-users" style="max-height:300px;overflow-y:auto;margin:20px 0;display:none;"></div>
            <button class="profile-btn" id="close-sigma">Закрыть</button>
        </div>
    </div>

    <script>
        // ========== ПРОСТАЯ ИНИЦИАЛИЗАЦИЯ ==========
        console.log("BitTalk запускается...");

        // ---------- ДАННЫЕ ----------
        let users = [];
        let currentUser = null;
        let messages = { general: [] };
        let chats = [{ id: 'general', name: 'Общий чат', type: 'group' }];

        // Загружаем пользователей
        const savedUsers = localStorage.getItem('bittalk_users');
        if (savedUsers) {
            users = JSON.parse(savedUsers);
        } else {
            users = [
                { id: '1', login: 'admin', password: 'admin', name: 'Админ', username: '@admin', bio: 'Админ', avatar: '👨‍💻' },
                { id: '2', login: 'user', password: 'user', name: 'Юзер', username: '@user', bio: 'Юзер', avatar: '👤' },
                { id: '3', login: 'test', password: '123', name: 'Тест', username: '@test', bio: 'Тест', avatar: '🧪' }
            ];
            localStorage.setItem('bittalk_users', JSON.stringify(users));
        }

        // Загружаем сообщения
        const savedMessages = localStorage.getItem('bittalk_messages');
        if (savedMessages) {
            messages = JSON.parse(savedMessages);
        } else {
            messages.general = [
                { id: '1', senderId: '1', text: 'Добро пожаловать!', time: Date.now() },
                { id: '2', senderId: '2', text: 'Привет!', time: Date.now() - 1000 }
            ];
            localStorage.setItem('bittalk_messages', JSON.stringify(messages));
        }

        // ---------- ЭЛЕМЕНТЫ ----------
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const loginInput = document.getElementById('login');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authError = document.getElementById('auth-error');
        const errorModal = document.getElementById('error-modal');
        const errorText = document.getElementById('error-text');
        const closeError = document.getElementById('close-error');
        
        // ---------- ФУНКЦИЯ ПОКАЗА ОШИБКИ ----------
        function showError(msg) {
            errorText.textContent = msg;
            errorModal.classList.add('show');
        }

        closeError.onclick = function() {
            errorModal.classList.remove('show');
        };

        // ---------- ВХОД ----------
        loginBtn.onclick = function() {
            console.log("Нажали Войти");
            
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!login || !password) {
                showError('Заполните все поля!');
                return;
            }
            
            // Ищем пользователя
            let found = null;
            for (let i = 0; i < users.length; i++) {
                if (users[i].login === login && users[i].password === password) {
                    found = users[i];
                    break;
                }
            }
            
            if (found) {
                console.log("Нашли пользователя:", found);
                currentUser = found;
                localStorage.setItem('bittalk_current', JSON.stringify(currentUser));
                
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                
                // Обновляем профиль
                document.getElementById('profile-name').value = currentUser.name || '';
                document.getElementById('profile-username').value = currentUser.username || '';
                document.getElementById('profile-bio').value = currentUser.bio || '';
                document.getElementById('profile-avatar').textContent = currentUser.avatar || '👤';
                document.getElementById('header-avatar').textContent = currentUser.avatar || '👤';
                
                // Показываем общий чат
                document.getElementById('chats-list').innerHTML = '<div class="chat-item" onclick="openGeneralChat()">💬 Общий чат</div>';
            } else {
                console.log("Пользователь не найден");
                showError('Нет такого пользователя с таким логином и паролем');
            }
        };

        // ---------- РЕГИСТРАЦИЯ ----------
        registerBtn.onclick = function() {
            console.log("Нажали Регистрация");
            
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!login || !password) {
                showError('Заполните все поля!');
                return;
            }
            
            if (login.length < 3) {
                showError('Логин должен быть минимум 3 символа');
                return;
            }
            
            if (password.length < 3) {
                showError('Пароль должен быть минимум 3 символа');
                return;
            }
            
            // Проверяем, есть ли уже такой
            for (let i = 0; i < users.length; i++) {
                if (users[i].login === login) {
                    showError('Пользователь уже существует');
                    return;
                }
            }
            
            // Создаем нового
            const newUser = {
                id: Date.now().toString(),
                login: login,
                password: password,
                name: login,
                username: '@' + login,
                bio: '',
                avatar: '👤'
            };
            
            users.push(newUser);
            localStorage.setItem('bittalk_users', JSON.stringify(users));
            
            currentUser = newUser;
            localStorage.setItem('bittalk_current', JSON.stringify(currentUser));
            
            authScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            
            document.getElementById('profile-name').value = currentUser.name;
            document.getElementById('profile-username').value = currentUser.username;
            document.getElementById('profile-bio').value = currentUser.bio;
            document.getElementById('profile-avatar').textContent = '👤';
            document.getElementById('header-avatar').textContent = '👤';
            
            document.getElementById('chats-list').innerHTML = '<div class="chat-item" onclick="openGeneralChat()">💬 Общий чат</div>';
        };

        // ---------- ПРОВЕРКА СЕССИИ ----------
        const savedUser = localStorage.getItem('bittalk_current');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            console.log("Восстанавливаем сессию:", currentUser);
            
            authScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            
            document.getElementById('profile-name').value = currentUser.name || '';
            document.getElementById('profile-username').value = currentUser.username || '';
            document.getElementById('profile-bio').value = currentUser.bio || '';
            document.getElementById('profile-avatar').textContent = currentUser.avatar || '👤';
            document.getElementById('header-avatar').textContent = currentUser.avatar || '👤';
            
            document.getElementById('chats-list').innerHTML = '<div class="chat-item" onclick="openGeneralChat()">💬 Общий чат</div>';
        }

        // ---------- ОТКРЫТИЕ ЧАТА ----------
        window.openGeneralChat = function() {
            console.log("Открываем общий чат");
            
            document.getElementById('chat-header').style.display = 'block';
            document.getElementById('chat-input-area').style.display = 'block';
            document.getElementById('current-chat-name').textContent = 'Общий чат';
            
            // Загружаем сообщения
            const msgs = messages.general || [];
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            for (let i = 0; i < msgs.length; i++) {
                const msg = msgs[i];
                const isMy = msg.senderId === currentUser.id;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (isMy ? 'my-message' : 'other-message');
                msgDiv.textContent = msg.text;
                container.appendChild(msgDiv);
            }
        };

        // ---------- ОТПРАВКА СООБЩЕНИЯ ----------
        document.getElementById('message-input').onkeypress = function(e) {
            if (e.key === 'Enter') {
                const text = this.value.trim();
                if (!text) return;
                
                const newMsg = {
                    id: Date.now().toString(),
                    senderId: currentUser.id,
                    text:
