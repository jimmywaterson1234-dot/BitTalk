<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk Messenger</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #0b0716;
            --glass-bg: rgba(25, 15, 45, 0.4);
            --glass-border: rgba(176, 38, 255, 0.2);
            --neon-purple: #b026ff;
            --neon-hover: #d16bff;
            --text-main: #ffffff;
            --text-muted: #a097b5;
            --message-my: rgba(176, 38, 255, 0.2);
            --message-other: rgba(255, 255, 255, 0.05);
            --danger: #ff2a5f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% -20%, #2a0a54 0%, var(--bg-color) 70%);
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(176, 38, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        /* Auth Screen */
        #auth-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(176, 38, 255, 0.1);
            transition: opacity 0.4s ease;
        }
        #auth-screen h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        input[type="text"], input[type="password"], input[type="file"], textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            box-shadow: inset 0 0 10px rgba(176, 38, 255, 0.1);
        }
        button:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }
        button.secondary {
            border-color: transparent;
            box-shadow: none;
            color: var(--text-muted);
        }
        button.secondary:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        button.danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: inset 0 0 10px rgba(255, 42, 95, 0.1);
        }
        button.danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px var(--danger);
        }
        .error-msg {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            text-shadow: 0 0 5px var(--danger);
        }

        /* Main App Layout */
        #app-screen {
            display: none;
            width: 100%;
            height: 100%;
            max-width: 1400px;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(11, 7, 22, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 8px var(--neon-purple);
        }
        .settings-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0;
            box-shadow: none;
        }
        .settings-btn:hover {
            background: none;
            box-shadow: none;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .chat-item:hover {
            background: rgba(176, 38, 255, 0.1);
        }
        .chat-item.active {
            background: rgba(176, 38, 255, 0.2);
            border: 1px solid var(--glass-border);
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2a2040;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid var(--neon-purple);
        }
        .chat-info {
            flex: 1;
            overflow: hidden;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty-chats {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 14px;
            font-style: italic;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            position: relative;
        }
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            background: rgba(25, 15, 45, 0.3);
            backdrop-filter: blur(10px);
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 70%;
            animation: fadeIn 0.3s ease forwards;
        }
        .message-wrapper.my-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.other-message {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid var(--neon-purple);
            transition: transform 0.2s;
        }
        .msg-avatar:hover {
            transform: scale(1.1);
        }
        .message {
            padding: 12px 16px;
            border-radius: 16px;
            position: relative;
            word-wrap: break-word;
        }
        .my-message .message {
            background: var(--message-my);
            border: 1px solid rgba(176, 38, 255, 0.3);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(176, 38, 255, 0.05);
        }
        .other-message .message {
            background: var(--message-other);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }
        .msg-author {
            font-size: 12px;
            color: var(--neon-purple);
            margin-bottom: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        .msg-author:hover {
            text-decoration: underline;
        }
        .msg-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            background: rgba(25, 15, 45, 0.3);
            backdrop-filter: blur(10px);
        }
        .input-area input {
            flex: 1;
            border-radius: 20px;
            padding: 15px 20px;
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal.show {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .modal-close:hover {
            color: white;
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            border: 3px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.3);
        }
        .profile-name {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .profile-about {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #app-screen { position: relative; }
            .sidebar { 
                width: 100%; 
                position: absolute; 
                height: 100%;
                transition: transform 0.3s ease;
            }
            .chat-area { width: 100%; }
            .mobile-back { display: block !important; margin-right: 15px; font-size: 20px; cursor: pointer;}
            .sidebar.hidden { transform: translateX(-100%); }
        }
        .mobile-back { display: none; }
        
        /* Loader */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color);
            z-index: 999;
            display: flex; justify-content: center; align-items: center;
            color: var(--neon-purple);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px var(--neon-purple);
            transition: opacity 0.5s;
        }
    </style>
</head>

                <div id="private-chats-container">

        <!-- Chat Area -->

                <div class="mobile-back" id="btn-mobile-back">←</div>
                <img src="" id="current-chat-avatar" class="chat-avatar" style="width: 40px; height: 40px;" alt="">
                <div class="chat-info">
                    <div class="chat-name" id="current-chat-name">Загрузка...</div>
                </div>
            </div>
            <div class="messages" id="messages-container">
                <!-- Messages will be injected here -->
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
                <button class="send-btn" id="btn-send-message">➤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal glass">
            <div class="modal-close" id="close-settings">×</div>
            <h2 style="margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-purple);">Настройки</h2>
            <div id="settings-error" class="error-msg"></div>
            <div class="input-group" style="text-align: center;">
                <img id="settings-avatar-preview" class="profile-avatar-large" src="" alt="Avatar">
                <input type="file" id="settings-avatar-input" accept="image/*" style="display: none;">
                <button id="btn-upload-avatar" class="secondary" style="width: auto; padding: 8px 16px; font-size: 14px;">Изменить аватарку</button>
            </div>
            <div class="input-group">
                <label>Никнейм</label>
                <input type="text" id="settings-username">
            </div>
            <div class="input-group">
                <label>О себе</label>
                <textarea id="settings-about" rows="3" style="resize: none;"></textarea>
            </div>
            <button id="btn-save-settings">Сохранить</button>
            <button id="btn-logout" class="danger" style="margin-top: 20px;">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal glass">
            <div class="modal-close" id="close-profile">×</div>
            <img id="profile-modal-avatar" class="profile-avatar-large" src="" alt="Avatar">
            <div id="profile-modal-name" class="profile-name">Имя</div>
            <div id="profile-modal-about" class="profile-about">Информация отсутствует</div>
            <button id="btn-write-message">Написать</button>
        </div>
    </div>
