<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk Messenger</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #0b0716;
            --glass-bg: rgba(25, 15, 45, 0.4);
            --glass-border: rgba(176, 38, 255, 0.2);
            --neon-purple: #b026ff;
            --neon-hover: #d16bff;
            --text-main: #ffffff;
            --text-muted: #a097b5;
            --message-my: rgba(176, 38, 255, 0.2);
            --message-other: rgba(255, 255, 255, 0.05);
            --danger: #ff2a5f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% -20%, #2a0a54 0%, var(--bg-color) 70%);
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(176, 38, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        /* Auth Screen */
        #auth-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(176, 38, 255, 0.1);
            transition: opacity 0.4s ease;
        }
        #auth-screen h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        input[type="text"], input[type="password"], input[type="file"], textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            box-shadow: inset 0 0 10px rgba(176, 38, 255, 0.1);
        }
        button:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }
        button.secondary {
            border-color: transparent;
            box-shadow: none;
            color: var(--text-muted);
        }
        button.secondary:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        button.danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: inset 0 0 10px rgba(255, 42, 95, 0.1);
        }
        button.danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px var(--danger);
        }
        .error-msg {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            text-shadow: 0 0 5px var(--danger);
        }

        /* Main App Layout */
        #app-screen {
            display: none;
            width: 100%;
            height: 100%;
            max-width: 1400px;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(11, 7, 22, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 8px var(--neon-purple);
        }
        .settings-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0;
            box-shadow: none;
        }
        .settings-btn:hover {
            background: none;
            box-shadow: none;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .chat-item:hover {
            background: rgba(176, 38, 255, 0.1);
        }
        .chat-item.active {
            background: rgba(176, 38, 255, 0.2);
            border: 1px solid var(--glass-border);
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2a2040;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid var(--neon-purple);
        }
        .chat-info {
            flex: 1;
            overflow: hidden;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty-chats {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 14px;
            font-style: italic;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            position: relative;
        }
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            background: rgba(25, 15, 45, 0.3);
            backdrop-filter: blur(10px);
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 70%;
            animation: fadeIn 0.3s ease forwards;
        }
        .message-wrapper.my-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.other-message {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid var(--neon-purple);
            transition: transform 0.2s;
        }
        .msg-avatar:hover {
            transform: scale(1.1);
        }
        .message {
            padding: 12px 16px;
            border-radius: 16px;
            position: relative;
            word-wrap: break-word;
        }
        .my-message .message {
            background: var(--message-my);
            border: 1px solid rgba(176, 38, 255, 0.3);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(176, 38, 255, 0.05);
        }
        .other-message .message {
            background: var(--message-other);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }
        .msg-author {
            font-size: 12px;
            color: var(--neon-purple);
            margin-bottom: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        .msg-author:hover {
            text-decoration: underline;
        }
        .msg-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            background: rgba(25, 15, 45, 0.3);
            backdrop-filter: blur(10px);
        }
        .input-area input {
            flex: 1;
            border-radius: 20px;
            padding: 15px 20px;
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal.show {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .modal-close:hover {
            color: white;
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            border: 3px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.3);
        }
        .profile-name {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .profile-about {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #app-screen { position: relative; }
            .sidebar { 
                width: 100%; 
                position: absolute; 
                height: 100%;
                transition: transform 0.3s ease;
            }
            .chat-area { width: 100%; }
            .mobile-back { display: block !important; margin-right: 15px; font-size: 20px; cursor: pointer;}
            .sidebar.hidden { transform: translateX(-100%); }
        }
        .mobile-back { display: none; }
        
        /* Loader */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color);
            z-index: 999;
            display: flex; justify-content: center; align-items: center;
            color: var(--neon-purple);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px var(--neon-purple);
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">Загрузка BitTalk...</div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="glass" style="display: none;">
        <h1 id="auth-title">Вход</h1>
        <div id="auth-error" class="error-msg"></div>
        <div class="input-group">
            <label>Никнейм</label>
            <input type="text" id="auth-username" placeholder="Введите ваш ник">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="auth-password" placeholder="Введите пароль">
        </div>
        <button id="btn-login">Войти</button>
        <button id="btn-register" class="secondary">Нет аккаунта? Регистрация</button>
    </div>

    <!-- Main App -->
    <div id="app-screen" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">BitTalk</div>
                <button class="settings-btn" id="btn-open-settings">⚙️</button>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="chat-item active" id="btn-global-chat">
                    <img src="https://ui-avatars.com/api/?name=G&background=b026ff&color=fff" class="chat-avatar" alt="Global">
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                    </div>
                </div>
                <div style="padding: 10px; margin-top: 10px; border-bottom: 1px solid var(--glass-border); font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Личные чаты</div>
                <div id="private-chats-container">
                    <!-- Private chats will be injected here -->
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="mobile-back" id="btn-mobile-back">←</div>
                <img src="" id="current-chat-avatar" class="chat-avatar" style="width: 40px; height: 40px;" alt="">
                <div class="chat-info">
                    <div class="chat-name" id="current-chat-name">Загрузка...</div>
                </div>
            </div>
            <div class="messages" id="messages-container">
                <!-- Messages will be injected here -->
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
                <button class="send-btn" id="btn-send-message">➤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal glass">
            <div class="modal-close" id="close-settings">×</div>
            <h2 style="margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-purple);">Настройки</h2>
            <div id="settings-error" class="error-msg"></div>
            <div class="input-group" style="text-align: center;">
                <img id="settings-avatar-preview" class="profile-avatar-large" src="" alt="Avatar">
                <input type="file" id="settings-avatar-input" accept="image/*" style="display: none;">
                <button id="btn-upload-avatar" class="secondary" style="width: auto; padding: 8px 16px; font-size: 14px;">Изменить аватарку</button>
            </div>
            <div class="input-group">
                <label>Никнейм</label>
                <input type="text" id="settings-username">
            </div>
            <div class="input-group">
                <label>О себе</label>
                <textarea id="settings-about" rows="3" style="resize: none;"></textarea>
            </div>
            <button id="btn-save-settings">Сохранить</button>
            <button id="btn-logout" class="danger" style="margin-top: 20px;">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal glass">
            <div class="modal-close" id="close-profile">×</div>
            <img id="profile-modal-avatar" class="profile-avatar-large" src="" alt="Avatar">
            <div id="profile-modal-name" class="profile-name">Имя</div>
            <div id="profile-modal-about" class="profile-about">Информация отсутствует</div>
            <button id="btn-write-message">Написать</button>
        </div>
    </div>

    <!-- Firebase & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, push, onValue, update, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIbPoQTfEbnv6XM8sZCM8T2u9X3I2LaaU",
            authDomain: "bittalk-new.firebaseapp.com",
            databaseURL: "https://bittalk-new-default-rtdb.firebaseio.com",
            projectId: "bittalk-new",
            storageBucket: "bittalk-new.firebasestorage.app",
            messagingSenderId: "579414009517",
            appId: "1:579414009517:web:394e4a4825ae692a3a4824",
            measurementId: "G-6VBFDV0WS2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // State
        let currentUser = null;
        let currentUserData = null;
        let activeChatId = 'global'; 
        let currentMessagesRef = null;
        let isLoginMode = true;
        let userCache = {}; 
        let selectedProfileUid = null;

        // DOM Elements
        const loader = document.getElementById('loader');
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const sidebar = document.getElementById('sidebar');
        
        // Auth UI
        const authTitle = document.getElementById('auth-title');
        const authError = document.getElementById('auth-error');
        const inputUsername = document.getElementById('auth-username');
        const inputPassword = document.getElementById('auth-password');
        const btnLogin = document.getElementById('btn-login');
        const btnRegisterToggle = document.getElementById('btn-register');

        // Main UI
        const privateChatsContainer = document.getElementById('private-chats-container');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const btnSendMessage = document.getElementById('btn-send-message');
        const currentChatName = document.getElementById('current-chat-name');
        const currentChatAvatar = document.getElementById('current-chat-avatar');
        const btnGlobalChat = document.getElementById('btn-global-chat');
        const btnMobileBack = document.getElementById('btn-mobile-back');

        // Modals
        const settingsModal = document.getElementById('settings-modal');
        const profileModal = document.getElementById('profile-modal');

        // Helpers
        const showError = (el, msg) => { el.innerText = msg; el.style.display = 'block'; setTimeout(() => el.style.display='none', 4000); };
        const getFakeEmail = (username) => `${username.toLowerCase()}@bittalk.local`;
        const getDefaultAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2a2040&color=b026ff&bold=true`;
        const formatTime = (ts) => {
            const d = new Date(ts);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        };
        const openModal = (modal) => { modal.style.display = 'flex'; setTimeout(() => { modal.style.opacity = '1'; modal.querySelector('.modal').classList.add('show'); }, 10); };
        const closeModal = (modal) => { modal.style.opacity = '0'; modal.querySelector('.modal').classList.remove('show'); setTimeout(() => modal.style.display = 'none', 300); };

        // Fetch User Profile with caching
        const getUserProfile = async (uid) => {
            if (userCache[uid]) return userCache[uid];
            const snap = await get(ref(db, `users/${uid}`));
            if (snap.exists()) {
                userCache[uid] = snap.val();
                return userCache[uid];
            }
            return { username: 'Unknown', avatar: getDefaultAvatar('U') };
        };

        // --- AUTH LOGIC ---
        btnRegisterToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? 'Вход' : 'Регистрация';
            btnLogin.innerText = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            btnRegisterToggle.innerText = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти';
            authError.style.display = 'none';
        });

        btnLogin.addEventListener('click', async () => {
            const username = inputUsername.value.trim();
            const password = inputPassword.value.trim();
            if(!username || !password) return showError(authError, 'Заполните все поля');

            try {
                if (!isLoginMode) {
                    // Registration
                    const usernameRef = ref(db, `usernames/${username.toLowerCase()}`);
                    const snap = await get(usernameRef);
                    if (snap.exists()) throw new Error('Никнейм уже занят');

                    const email = getFakeEmail(username);
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    const uid = userCred.user.uid;

                    const userData = {
                        uid,
                        username: username,
                        usernameLower: username.toLowerCase(),
                        avatar: getDefaultAvatar(username),
                        about: 'Привет! Я использую BitTalk.'
                    };

                    await set(ref(db, `users/${uid}`), userData);
                    await set(usernameRef, uid);
                } else {
                    // Login
                    const uidSnap = await get(ref(db, `usernames/${username.toLowerCase()}`));
                    if(!uidSnap.exists()) throw new Error('Пользователь не найден');
                    await signInWithEmailAndPassword(auth, getFakeEmail(username), password);
                }
            } catch (error) {
                let msg = error.message;
                if(error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') msg = 'Неверный ник или пароль';
                else if(error.code === 'auth/weak-password') msg = 'Пароль слишком слабый';
                showError(authError, msg);
            }
        });

        // --- SESSION MANGEMENT ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(ref(db, `users/${user.uid}`));
                if(snap.exists()) {
                    currentUserData = snap.val();
                    userCache[user.uid] = currentUserData;
                    showApp();
                } else {
                    signOut(auth);
                }
            } else {
                currentUser = null;
                currentUserData = null;
                showAuth();
            }
            setTimeout(() => { loader.style.opacity = '0'; setTimeout(()=>loader.style.display='none', 500); }, 500);
        });

        const showAuth = () => {
            appScreen.style.display = 'none';
            authScreen.style.display = 'block';
            if(currentMessagesRef) off(currentMessagesRef);
            off(ref(db, `userChats/${currentUser?.uid || 'none'}`));
        };

        const showApp = () => {
            authScreen.style.display = 'none';
            appScreen.style.display = 'flex';
            inputUsername.value = ''; inputPassword.value = '';
            loadPrivateChats();
            openChat('global');
        };

        // --- CHAT LOGIC ---
        const getPrivateChatId = (uid1, uid2) => uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;

        btnGlobalChat.addEventListener('click', () => openChat('global'));

        const openChat = async (chatId, targetUid = null) => {
            activeChatId = chatId;
            messagesContainer.innerHTML = '';
            
            // UI updates
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            if(chatId === 'global') {
                btnGlobalChat.classList.add('active');
                currentChatName.innerText = 'Общий чат';
                currentChatAvatar.src = 'https://ui-avatars.com/api/?name=G&background=b026ff&color=fff';
            } else {
                const chatEl = document.getElementById(`chat-${chatId}`);
                if(chatEl) chatEl.classList.add('active');
                
                // Get target user info
                const targetProfile = await getUserProfile(targetUid);
                currentChatName.innerText = targetProfile.username;
                currentChatAvatar.src = targetProfile.avatar;
            }

            // Mobile view switch
            if(window.innerWidth <= 768) sidebar.classList.add('hidden');

            // Detach old listener
            if(currentMessagesRef) off(currentMessagesRef);

            // Attach new listener
            const path = chatId === 'global' ? 'publicChat' : `privateChats/${chatId}/messages`;
            currentMessagesRef = ref(db, path);
            
            onChildAdded(currentMessagesRef, async (snapshot) => {
                const msg = snapshot.val();
                renderMessage(msg);
            });
        };

        const renderMessage = async (msg) => {
            const isMine = msg.uid === currentUser.uid;
            const profile = await getUserProfile(msg.uid);
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isMine ? 'my-message' : 'other-message'}`;
            
            const timeStr = formatTime(msg.timestamp);

            wrapper.innerHTML = `
                ${!isMine ? `<img src="${profile.avatar}" class="msg-avatar" data-uid="${msg.uid}" alt="Avatar">` : ''}
                <div class="message">
                    ${!isMine ? `<div class="msg-author" data-uid="${msg.uid}">${profile.username}</div>` : ''}
                    <div class="msg-text">${escapeHTML(msg.text)}</div>
                    <div class="msg-time">${timeStr}</div>
                </div>
            `;

            messagesContainer.appendChild(wrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Add profile click events
            if(!isMine) {
                const avatarEl = wrapper.querySelector('.msg-avatar');
                const nameEl = wrapper.querySelector('.msg-author');
                const openProf = () => showProfileModal(msg.uid);
                if(avatarEl) avatarEl.addEventListener('click', openProf);
                if(nameEl) nameEl.addEventListener('click', openProf);
            }
        };

        const escapeHTML = (str) => {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        };

        const sendMessage = async () => {
            const text = messageInput.value.trim();
            if(!text) return;

            messageInput.value = '';
            const path = activeChatId === 'global' ? 'publicChat' : `privateChats/${activeChatId}/messages`;
            const msgRef = push(ref(db, path));
            
            const message = {
                uid: currentUser.uid,
                text: text,
                timestamp: Date.now()
            };

            await set(msgRef, message);

            // If private, ensure chat info is saved for both
            if(activeChatId !== 'global') {
                const targetUid = activeChatId.replace(currentUser.uid, '').replace('_', '');
                const updateData = {
                    [`userChats/${currentUser.uid}/${activeChatId}`]: { targetUid, timestamp: Date.now() },
                    [`userChats/${targetUid}/${activeChatId}`]: { targetUid: currentUser.uid, timestamp: Date.now() }
                };
                update(ref(db), updateData);
            }
        };

        btnSendMessage.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        // Load Private Chats for Sidebar
        const loadPrivateChats = () => {
            const chatsRef = ref(db, `userChats/${currentUser.uid}`);
            onValue(chatsRef, async (snapshot) => {
                privateChatsContainer.innerHTML = '';
                if(!snapshot.exists()) {
                    privateChatsContainer.innerHTML = '<div class="empty-chats">Нет личных чатов</div>';
                    return;
                }
                
                const chats = [];
                snapshot.forEach(child => {
                    chats.push({ id: child.key, ...child.val() });
                });
                
                chats.sort((a,b) => b.timestamp - a.timestamp);

                for(let chat of chats) {
                    const targetProfile = await getUserProfile(chat.targetUid);
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId === chat.id ? 'active' : ''}`;
                    div.id = `chat-${chat.id}`;
                    div.innerHTML = `
                        <img src="${targetProfile.avatar}" class="chat-avatar" alt="A">
                        <div class="chat-info">
                            <div class="chat-name">${targetProfile.username}</div>
                        </div>
                    `;
                    div.addEventListener('click', () => openChat(chat.id, chat.targetUid));
                    privateChatsContainer.appendChild(div);
                }
            });
        };

        // Mobile Sidebar Toggle
        btnMobileBack.addEventListener('click', () => {
            sidebar.classList.remove('hidden');
        });

        // --- PROFILE MODAL ---
        const showProfileModal = async (uid) => {
            selectedProfileUid = uid;
            const profile = await getUserProfile(uid);
            document.getElementById('profile-modal-avatar').src = profile.avatar;
            document.getElementById('profile-modal-name').innerText = profile.username;
            document.getElementById('profile-modal-about').innerText = profile.about || 'Информация отсутствует';
            
            const btnWrite = document.getElementById('btn-write-message');
            if(uid === currentUser.uid) {
                btnWrite.style.display = 'none';
            } else {
                btnWrite.style.display = 'block';
            }
            openModal(profileModal);
        };

        document.getElementById('close-profile').addEventListener('click', () => closeModal(profileModal));
        
        document.getElementById('btn-write-message').addEventListener('click', () => {
            closeModal(profileModal);
            const chatId = getPrivateChatId(currentUser.uid, selectedProfileUid);
            openChat(chatId, selectedProfileUid);
        });

        // --- SETTINGS MODAL ---
        document.getElementById('btn-open-settings').addEventListener('click', () => {
            document.getElementById('settings-avatar-preview').src = currentUserData.avatar;
            document.getElementById('settings-username').value = currentUserData.username;
            document.getElementById('settings-about').value = currentUserData.about || '';
            document.getElementById('settings-error').style.display = 'none';
            openModal(settingsModal);
        });

        document.getElementById('close-settings').addEventListener('click', () => closeModal(settingsModal));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // Avatar Upload
        const avatarInput = document.getElementById('settings-avatar-input');
        let newAvatarFile = null;

        document.getElementById('btn-upload-avatar').addEventListener('click', () => avatarInput.click());
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                newAvatarFile = file;
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('settings-avatar-preview').src = e.target.result; };
                reader.readAsDataURL(file);
            }
        });

        // Save Settings
        document.getElementById('btn-save-settings').addEventListener('click', async () => {
            const errEl = document.getElementById('settings-error');
            const newName = document.getElementById('settings-username').value.trim();
            const newAbout = document.getElementById('settings-about').value.trim();
            const btn = document.getElementById('btn-save-settings');
            
            if(!newName) return showError(errEl, 'Никнейм не может быть пустым');

            btn.disabled = true;
            btn.innerText = 'Сохранение...';

            try {
                let updates = { about: newAbout };

                if(newName.toLowerCase() !== currentUserData.usernameLower) {
                    const nameRef = ref(db, `usernames/${newName.toLowerCase()}`);
                    const snap = await get(nameRef);
                    if(snap.exists()) throw new Error('Этот ник уже занят');

                    try {
                        await updateEmail(auth.currentUser, getFakeEmail(newName));
                    } catch(e) {
                        throw new Error('Для смены ника требуется недавняя авторизация. Выйдите и зайдите снова.');
                    }

                    const oldNameRef = ref(db, `usernames/${currentUserData.usernameLower}`);
                    await set(oldNameRef, null); 
                    await set(nameRef, currentUser.uid); 
                    
                    updates.username = newName;
                    updates.usernameLower = newName.toLowerCase();
                }

                if(newAvatarFile) {
                    const sRef = storageRef(storage, `avatars/${currentUser.uid}`);
                    await uploadBytes(sRef, newAvatarFile);
                    const url = await getDownloadURL(sRef);
                    updates.avatar = url;
                    newAvatarFile = null;
                }

                await update(ref(db, `users/${currentUser.uid}`), updates);
                
                Object.assign(currentUserData, updates);
                userCache[currentUser.uid] = currentUserData;

                closeModal(settingsModal);
            } catch (error) {
                showError(errEl, error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Сохранить';
            }
        });

        // Close modals on overlay click
        [settingsModal, profileModal].forEach(modal => {
            modal.addEventListener('click', (e) => {
                if(e.target === modal) closeModal(modal);
            });
        });

    </script>
</body>
</html>
