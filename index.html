<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk 💜 НЕОНОВЫЙ МЕССЕНДЖЕР</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
            max-width: 1400px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #8a2be2;
            border: 1px solid #8a2be2;
            position: relative;
            overflow: hidden;
        }

        /* ========== АНИМИРОВАННЫЙ ФОН С ТЕКСТОМ ========== */
        .floating-text-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-text {
            position: absolute;
            color: rgba(138, 43, 226, 0.15);
            font-size: 120px;
            font-weight: 900;
            white-space: nowrap;
            text-transform: uppercase;
            animation: floatText 20s linear infinite;
            text-shadow: 0 0 20px #8a2be2;
            letter-spacing: 10px;
        }

        .floating-text:nth-child(1) {
            top: 10%;
            left: -10%;
            animation-duration: 25s;
            opacity: 0.2;
        }

        .floating-text:nth-child(2) {
            top: 30%;
            left: -15%;
            animation-duration: 30s;
            animation-delay: -5s;
            opacity: 0.15;
            font-size: 150px;
        }

        .floating-text:nth-child(3) {
            top: 50%;
            left: -20%;
            animation-duration: 35s;
            animation-delay: -10s;
            opacity: 0.1;
            font-size: 180px;
        }

        .floating-text:nth-child(4) {
            top: 70%;
            left: -25%;
            animation-duration: 40s;
            animation-delay: -15s;
            opacity: 0.12;
            font-size: 200px;
        }

        .floating-text:nth-child(5) {
            top: 90%;
            left: -30%;
            animation-duration: 45s;
            animation-delay: -20s;
            opacity: 0.08;
            font-size: 220px;
        }

        @keyframes floatText {
            0% {
                transform: translateX(-10%) rotate(-15deg);
            }
            100% {
                transform: translateX(110%) rotate(-15deg);
            }
        }

        /* ========== ЭКРАН АВТОРИЗАЦИИ ========== */
        #auth-screen {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a0b2e, #0a0a0f);
            position: relative;
            z-index: 1;
        }

        .auth-container {
            background: rgba(26, 11, 46, 0.95);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #8a6fd0;
            box-shadow: 0 0 50px #8a6fd0, 0 0 100px #4f3780 inset;
            animation: neonPulseAuth 3s infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes neonPulseAuth {
            0% { box-shadow: 0 0 30px #8a6fd0, 0 0 60px #4f3780 inset; }
            50% { box-shadow: 0 0 60px #b79aff, 0 0 100px #8a6fd0 inset; }
            100% { box-shadow: 0 0 30px #8a6fd0, 0 0 60px #4f3780 inset; }
        }

        .auth-container h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 42px;
            text-shadow: 0 0 20px #b79aff, 0 0 40px #8a6fd0;
            letter-spacing: 4px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(45, 27, 74, 0.9);
            border: 2px solid #6b4f9f;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: #b79aff;
            box-shadow: 0 0 30px #8a6fd0;
            transform: scale(1.02);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px #8a6fd0;
        }

        /* ========== МОДАЛЬНОЕ ОКНО ОШИБКИ ========== */
        .error-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .error-modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .error-content {
            background: #1a0b2e;
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 100px #ff6b6b;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-content h3 {
            color: #ff6b6b;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .error-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff4444);
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 30px #ff6b6b;
        }

        /* ========== ОСНОВНОЙ ИНТЕРФЕЙС (ТЕЛЕГРАМ СТИЛЬ) ========== */
        #main-app {
            display: none;
            height: 100%;
            flex-direction: column;
            background: #0f0f1a;
            position: relative;
            z-index: 2;
        }

        /* Верхняя панель */
        .main-header {
            background: rgba(26, 11, 46, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #8a6fd0;
            box-shadow: 0 0 30px #8a6fd0;
        }

        .header-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #b79aff;
            flex: 1;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px #8a6fd0;
        }

        /* Контейнер с тремя колонками (как в Telegram) */
        .telegram-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Левая колонка - список чатов */
        .chats-column {
            width: 320px;
            background: rgba(26, 11, 46, 0.8);
            backdrop-filter: blur(10px);
            border-right: 2px solid #8a6fd0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-box {
            padding: 15px;
            background: rgba(26, 11, 46, 0.9);
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 14px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            margin: 5px 0;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(58, 37, 99, 0.5);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(79, 55, 128, 0.8);
            border-color: #8a6fd0;
            transform: translateX(5px);
            box-shadow: 0 0 20px #8a6fd0;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin-right: 12px;
            position: relative;
        }

        .online-indicator {
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #3a2563;
            box-shadow: 0 0 10px #4caf50;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last {
            color: #b79aff;
            font-size: 12px;
        }

        /* Центральная колонка - сообщения */
        .messages-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 26, 0.9);
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(26, 11, 46, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #8a6fd0;
            display: flex;
            align-items: center;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px #8a6fd0;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-header-status {
            color: #b79aff;
            font-size: 13px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 60%;
            margin: 5px 0;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messageAppear 0.3s;
        }

        @keyframes messageAppear {
            from { 
                opacity: 0; 
                transform: translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(45deg, #8a6fd0, #6b4f9f);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(58, 37, 99, 0.8);
            color: white;
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            cursor: pointer;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-time {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
            text-align: right;
        }

        .message-input-area {
            padding: 20px;
            background: rgba(26, 11, 46, 0.9);
            backdrop-filter: blur(10px);
            border-top: 2px solid #8a6fd0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 25px;
            color: white;
            font-size: 15px;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px #8a6fd0;
        }

        /* Правая колонка - профиль */
        .profile-column {
            width: 320px;
            background: rgba(26, 11, 46, 0.8);
            backdrop-filter: blur(10px);
            border-left: 2px solid #8a6fd0;
            padding: 20px;
            overflow-y: auto;
        }

        .profile-section {
            background: rgba(58, 37, 99, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #6b4f9f;
        }

        .profile-title {
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #b79aff;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border-radius: 50%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 30px #8a6fd0;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            color: white;
        }

        .profile-avatar:hover .avatar-overlay {
            opacity: 1;
        }

        .profile-input {
            width: 100%;
            padding: 12px;
            background: rgba(45, 27, 74, 0.8);
            border: 2px solid #6b4f9f;
            border-radius: 10px;
            color: white;
            margin: 8px 0;
        }

        .profile-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #8a6fd0, #b79aff);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
        }

        /* Модальное окно профиля пользователя */
        .user-profile-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .user-profile-content {
            background: #1a0b2e;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            border: 3px solid #8a6fd0;
            box-shadow: 0 0 100px #8a6fd0;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: #b79aff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- АНИМИРОВАННЫЙ ФОН С ТЕКСТОМ -->
        <div class="floating-text-bg">
            <div class="floating-text">BitTalk</div>
            <div class="floating-text">BitTalk</div>
            <div class="floating-text">BitTalk</div>
            <div class="floating-text">BitTalk</div>
            <div class="floating-text">BitTalk</div>
        </div>

        <!-- ЭКРАН АВТОРИЗАЦИИ -->
        <div id="auth-screen">
            <div class="auth-container">
                <h2>💜 BitTalk</h2>
                <input type="text" id="login-input" class="auth-input" placeholder="Логин" value="admin" autocomplete="off">
                <input type="password" id="password-input" class="auth-input" placeholder="Пароль" value="admin" autocomplete="off">
                <div id="auth-error" style="color: #ff6b6b; text-align: center; margin: 10px 0; display: none;"></div>
                <button id="login-btn" class="auth-btn">🚀 Войти</button>
                <button id="register-btn" class="auth-btn" style="background: linear-gradient(45deg, #4f3780, #6b4f9f);">✨ Регистрация</button>
                
                <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                    <p style="color: #b79aff; margin-bottom: 5px;">📋 Тестовые аккаунты:</p>
                    <p style="color: white;">admin / admin</p>
                    <p style="color: white;">user / user</p>
                    <p style="color: white;">test / 123</p>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО ОШИБКИ -->
        <div class="error-modal" id="error-modal">
            <div class="error-content">
                <h3>⚠️ ОШИБКА</h3>
                <p id="error-message" style="color: white; font-size: 18px; margin: 20px 0;"></p>
                <button class="error-btn"
