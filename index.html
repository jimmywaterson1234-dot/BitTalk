<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitTalk Elite v.9 | Global Search & Groups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #a855f7; --bg: #0c0617; --glass: rgba(25, 12, 45, 0.9); }
        body { background: var(--bg); color: #f3e8ff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(168, 85, 247, 0.2); }
        
        /* Message Logic */
        .bubble { max-width: 80%; padding: 12px; border-radius: 20px; position: relative; animation: slideUp 0.2s ease; cursor: pointer; }
        .bubble-mine { background: linear-gradient(135deg, #9333ea, #6b21a8); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-other { background: #1e113a; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* UI Elements */
        .video-note { width: 170px; height: 170px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p); }
        #context-menu { position: fixed; z-index: 1000; display: none; width: 180px; }
        .menu-item { padding: 12px; cursor: pointer; transition: 0.2s; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:hover { background: rgba(168, 85, 247, 0.2); }

        @media (max-width: 768px) {
            #side-panel { width: 100%; position: absolute; z-index: 20; transition: 0.3s; }
            .side-hidden { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="h-screen flex">

<div id="auth-screen" class="fixed inset-0 z-[2000] bg-[#0c0617] flex items-center justify-center p-6">
    <div class="glass p-8 rounded-[40px] w-full max-w-sm text-center">
        <div class="w-16 h-16 bg-p rounded-2xl mx-auto mb-4 flex items-center justify-center text-2xl font-bold">BT</div>
        <h1 class="text-2xl font-black mb-6 italic tracking-tighter">BitTalk OS</h1>
        <input id="auth-login" type="text" placeholder="@username" class="w-full p-4 mb-3 rounded-2xl bg-black/40 border border-p/20 outline-none focus:border-p">
        <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 mb-6 rounded-2xl bg-black/40 border border-p/20 outline-none focus:border-p">
        <button id="auth-btn" class="w-full py-4 bg-p rounded-2xl font-bold shadow-lg shadow-p/30">Начать общение</button>
    </div>
</div>

<div id="side-panel" class="w-full md:w-[380px] flex flex-col glass border-r border-white/5 transition-transform">
    <div class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic">BitTalk</h2>
            <div class="flex gap-2">
                <button id="create-group" class="p-2 bg-p/20 rounded-xl" title="Создать группу">👥</button>
                <button id="open-settings" class="p-2 bg-p/20 rounded-xl">⚙️</button>
            </div>
        </div>
        <div class="relative">
            <input id="global-search" type="text" placeholder="Поиск по юзернейму..." class="w-full p-3 pl-10 rounded-xl bg-black/40 border border-p/10 outline-none text-xs focus:border-p/50">
            <span class="absolute left-3 top-3 opacity-30">🔍</span>
            <div id="search-results" class="absolute top-full left-0 right-0 z-50 glass mt-2 rounded-2xl overflow-hidden hidden shadow-2xl"></div>
        </div>
    </div>
    <div id="chats-list" class="flex-1 overflow-y-auto px-4 space-y-1"></div>
</div>

<div id="chat-window" class="flex-1 flex flex-col relative">
    <div id="chat-header" class="p-4 glass flex justify-between items-center cursor-pointer">
        <div class="flex items-center gap-3">
            <button id="back-btn" class="md:hidden">⬅️</button>
            <div id="h-avatar" class="w-10 h-10 bg-p rounded-xl flex items-center justify-center font-bold">?</div>
            <div>
                <h3 id="h-name" class="font-bold text-sm leading-none">Выберите чат</h3>
                <p id="h-status" class="text-[9px] text-p font-bold uppercase tracking-widest mt-1">офлайн</p>
            </div>
        </div>
    </div>

    <div id="msg-area" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

    <div class="p-4 glass">
        <div id="reply-ui" class="hidden bg-white/5 p-2 rounded-xl mb-2 flex justify-between text-xs italic">
            <span id="reply-val">Ответ...</span>
            <button onclick="clearReply()">✕</button>
        </div>
        <div class="flex items-end gap-2 p-2 bg-black/30 rounded-[24px]">
            <input type="file" id="img-input" class="hidden" accept="image/*">
            <button id="btn-img" class="p-3 text-xl">🖼️</button>
            <textarea id="msg-input" rows="1" placeholder="Сообщение..." class="flex-1 bg-transparent p-3 outline-none resize-none text-sm"></textarea>
            <button id="btn-video" class="p-3 text-xl">🎥</button>
            <button id="btn-send" class="p-4 bg-p rounded-2xl shadow-lg shadow-p/40 transition-transform active:scale-90">
                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="context-menu" class="glass rounded-2xl overflow-hidden shadow-2xl shadow-black">
    <div class="menu-item" onclick="msgAction('reply')">↩️ Ответить</div>
    <div class="menu-item" onclick="msgAction('edit')" id="m-edit">✏️ Редактировать</div>
    <div class="menu-item" onclick="msgAction('forward')">➡️ Переслать</div>
    <div class="menu-item text-red-400" onclick="msgAction('delete')">🗑️ Удалить</div>
</div>

<div id="modal" class="fixed inset-0 z-[500] bg-black/90 hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div id="modal-box" class="glass w-full max-w-md p-8 rounded-[40px] relative shadow-2xl">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-xl">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const fbConf = {
        apiKey: "AIzaSyCaCtnz5ZJPJtq04Xm24dw5xc7QPZUHue",
        authDomain: "bittalk-e6df4.firebaseapp.com",
        databaseURL: "https://bittalk-e6df4-default-rtdb.firebaseio.com",
        projectId: "bittalk-e6df4"
    };

    const fb = initializeApp(fbConf);
    const db = getDatabase(fb);

    let user = JSON.parse(localStorage.getItem('bt_v9_user')) || null;
    let activeChat = null; 
    let activeRoom = null;
    let selectedMsg = null;
    let replyId = null;
    let editingId = null;

    // --- ИНИЦИАЛИЗАЦИЯ ---
    if(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        renderChatList();
        updateStatus(true);
    }

    // --- АВТОРИЗАЦИЯ ---
    document.getElementById('auth-btn').onclick = () => {
        const login = document.getElementById('auth-login').value.trim().replace('@','').toLowerCase();
        const pass = document.getElementById('auth-pass').value.trim();
        if(!login || !pass) return alert("Заполни поля");

        onValue(ref(db, `users/${login}`), (s) => {
            if(s.exists() && s.val().pass !== pass) return alert("Неверный пароль");
            const uData = s.exists() ? s.val() : { login, pass, name: login, bio: 'Привет! Я в BitTalk', groups: [] };
            if(!s.exists()) set(ref(db, `users/${login}`), uData);
            localStorage.setItem('bt_v9_user', JSON.stringify(uData));
            location.reload();
        }, {onlyOnce: true});
    };

    // --- ГЛОБАЛЬНЫЙ ПОИСК ---
    document.getElementById('global-search').oninput = (e) => {
        const query = e.target.value.trim().toLowerCase();
        const resDiv = document.getElementById('search-results');
        if(!query) return resDiv.classList.add('hidden');

        onValue(ref(db, 'users'), (s) => {
            const users = s.val();
            resDiv.innerHTML = '';
            resDiv.classList.remove('hidden');
            for(let id in users) {
                if(id.includes(query) && id !== user.login) {
                    const d = document.createElement('div');
                    d.className = "p-4 hover:bg-p/20 cursor-pointer text-sm border-b border-white/5";
                    d.innerHTML = `<b>@${id}</b> <span class="opacity-50 ml-2">${users[id].name}</span>`;
                    d.onclick = () => { openChat(id, users[id].name); resDiv.classList.add('hidden'); };
                    resDiv.appendChild(d);
                }
            }
        });
    };

    // --- ГРУППОВЫЕ ЧАТЫ ---
    document.getElementById('create-group').onclick = () => {
        onValue(ref(db, 'users'), (s) => {
            const users = s.val();
            let html = '<h3 class="text-xl font-bold mb-4">Создать группу</h3><div class="space-y-2 max-h-60 overflow-y-auto">';
            for(let id in users) {
                if(id === user.login) continue;
                html += `<label class="flex justify-between p-3 bg-white/5 rounded-xl cursor-pointer">
                    <span>@${id}</span> <input type="checkbox" value="${id}" class="g-member">
                </label>`;
            }
            html += `</div><input id="g-name" placeholder="Название группы" class="w-full p-4 mt-4 rounded-xl bg-black/40 border border-p/20">
                     <button onclick="window.finishGroup()" class="w-full py-4 bg-p mt-4 rounded-xl font-bold">Создать</button>`;
            showModal(html);
        }, {onlyOnce: true});
    };

    window.finishGroup = () => {
        const name = document.getElementById('g-name').value;
        const members = Array.from(document.querySelectorAll('.g-member:checked')).map(i => i.value);
        if(!name || members.length < 1) return alert("Укажите имя и участников");
        members.push(user.login);
        const gId = 'group_' + Date.now();
        set(ref(db, `groups/${gId}`), { name, members });
        closeModal();
        openChat(gId, name, true);
    };

    // --- ЛОГИКА ЧАТА ---
    function renderChatList() {
        onValue(ref(db, 'users'), (s) => {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            const data = s.val();
            // Сюда можно добавить логику отображения только тех, с кем есть диалог
            for(let id in data) {
                if(id === user.login) continue;
                const u = data[id];
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-4 rounded-2xl cursor-pointer hover:bg-p/10 transition-all";
                div.innerHTML = `<div class="w-12 h-12 bg-p rounded-xl flex items-center justify-center font-bold">${u.name[0]}</div>
                                 <div class="flex-1"><h4 class="font-bold text-sm">@${id}</h4><p class="text-[10px] text-p">${u.isOnline ? 'online' : 'offline'}</p></div>`;
                div.onclick = () => openChat(id, u.name);
                list.appendChild(div);
            }
        });
    }

    function openChat(id, name, isGroup = false) {
        activeChat = id;
        activeRoom = isGroup ? id : [user.login, id].sort().join('_');
        document.getElementById('h-name').innerText = isGroup ? name : `@${id}`;
        document.getElementById('msg-area').innerHTML = '';
        if(window.innerWidth < 768) document.getElementById('side-panel').classList.add('side-hidden');
        
        onValue(ref(db, `rooms/${activeRoom}`), (s) => {
            document.getElementById('msg-area').innerHTML = '';
            const msgs = s.val();
            for(let mId in msgs) renderMsg(mId, msgs[mId]);
        });
    }

    function renderMsg(mId, msg) {
        const area = document.getElementById('msg-area');
        const isMine = msg.sender === user.login;
        const div = document.createElement('div');
        div.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-other'}`;
        div.id = `msg-${mId}`;
        
        let content = '';
        if(msg.type === 'video') content = `<video src="${msg.data}" class="video-note" controls></video>`;
        else if(msg.type === 'img') content = `<img src="${msg.data}" class="max-w-full rounded-xl">`;
        else content = `<p class="text-sm">${msg.text}</p>`;

        div.innerHTML = `
            ${msg.replyTo ? `<div class="text-[10px] opacity-50 border-l-2 pl-2 mb-1">В ответ на сообщение</div>` : ''}
            ${content}
            <div class="text-[8px] opacity-40 text-right mt-1">${msg.time} ${msg.edited ? '(ред.)' : ''} ✓✓</div>
        `;
        
        div.oncontextmenu = (e) => {
            e.preventDefault();
            selectedMsg = { id: mId, text: msg.text };
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            document.getElementById('m-edit').style.display = isMine ? 'block' : 'none';
        };
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // --- ДЕЙСТВИЯ ---
    document.getElementById('btn-send').onclick = () => {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !activeRoom) return;

        if(editingId) {
            update(ref(db, `rooms/${activeRoom}/${editingId}`), { text, edited: true });
            editingId = null;
        } else {
            push(ref(db, `rooms/${activeRoom}`), {
                sender: user.login,
                text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                replyTo: replyId
            });
        }
        input.value = '';
        window.clearReply();
    };

    window.msgAction = (act) => {
        document.getElementById('context-menu').style.display = 'none';
        if(act === 'delete') remove(ref(db, `rooms/${activeRoom}/${selectedMsg.id}`));
        if(act === 'edit') {
            editingId = selectedMsg.id;
            document.getElementById('msg-input').value = selectedMsg.text;
        }
        if(act === 'reply') {
            replyId = selectedMsg.id;
            document.getElementById('reply-ui').classList.remove('hidden');
        }
        if(act === 'forward') {
            const target = prompt("Кому переслать (@username)?");
            if(target) {
                const room = [user.login, target.replace('@','')].sort().join('_');
                push(ref(db, `rooms/${room}`), { sender: user.login, text: `[Переслано]: ${selectedMsg.text}`, time: 'now' });
                alert("Переслано!");
            }
        }
    };

    // --- ОБЩИЕ ФУНКЦИИ ---
    function showModal(html) {
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    }
    window.closeModal = () => document.getElementById('modal').classList.add('hidden');
    window.clearReply = () => { replyId = null; document.getElementById('reply-ui').classList.add('hidden'); };
    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    document.getElementById('open-settings').onclick = () => {
        const pass = prompt("Sigma Password:");
        if(pass === "1234567891011121314151617181920") {
            onValue(ref(db, 'users'), (s) => {
                const users = s.val();
                let h = '<h3 class="text-amber-500 font-bold mb-4">Sigma Panel</h3>';
                for(let id in users) h += `<div class="flex justify-between mb-2 text-xs"><span>@${id}</span> <button onclick="remove(ref(db, 'users/${id}'))" class="text-red-500">DEL</button></div>`;
                showModal(h);
            });
        } else {
            showModal(`<div class="text-center">
                <h3 class="text-xl font-bold mb-4">Ваш профиль</h3>
                <p>Имя: ${user.name}</p><p class="mb-4">@${user.login}</p>
                <button onclick="localStorage.clear(); location.reload()" class="w-full py-3 bg-red-500 rounded-xl">Выйти</button>
            </div>`);
        }
    };

    document.getElementById('back-btn').onclick = () => document.getElementById('side-panel').classList.remove('side-hidden');

    function updateStatus(st) {
        if(user) update(ref(db, `users/${user.login}`), { isOnline: st });
    }
    window.onbeforeunload = () => updateStatus(false);
</script>
</body>
</html>
