<script type="module" src="script.js"></script>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitTalk Pro | Violet Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #16161d;
            --accent: #8b5cf6; /* Фиолетовый */
            --text: #f1f1f1;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .violet-gradient { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
        .glass { background: rgba(22, 22, 29, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(139, 92, 246, 0.2); }
        .avatar-capsule { border-radius: 14px; width: 48px; height: 48px; object-fit: cover; border: 2px solid var(--accent); }
        .hidden { display: none !important; }
        .msg-mine { background: var(--accent); border-radius: 18px 18px 0 18px; align-self: flex-end; }
        .msg-other { background: #26262e; border-radius: 18px 18px 18px 0; align-self: flex-start; }
        #video-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); display: none; }
        .scroll-hide::-webkit-scrollbar { width: 4px; }
        .scroll-hide::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-screen" class="h-screen w-full flex items-center justify-center p-4">
    <div class="glass p-8 rounded-[32px] w-full max-w-sm shadow-2xl border-indigo-500/30">
        <div class="text-center mb-8">
            <div class="inline-block p-4 violet-gradient rounded-3xl shadow-lg shadow-purple-500/40 mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">BitTalk <span class="text-purple-500">PRO</span></h1>
        </div>

        <div id="auth-form" class="space-y-4">
            <input id="auth-login" type="text" placeholder="Юзернейм (@username)" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/20 outline-none focus:border-purple-500 transition-all">
            <input id="auth-pass" type="password" placeholder="Пароль" class="w-full p-4 rounded-2xl bg-black/40 border border-purple-500/20 outline-none focus:border-purple-500 transition-all">
            <p id="auth-msg" class="text-red-400 text-xs text-center hidden"></p>
            
            <button id="login-btn" class="w-full py-4 violet-gradient rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Войти</button>
            <button id="reg-view-btn" class="w-full text-sm text-purple-400 font-medium">Нет аккаунта? Зарегистрироваться</button>
        </div>
    </div>
</div>

<div id="main-app" class="h-screen flex hidden overflow-hidden">
    
    <div id="side-panel" class="w-full md:w-96 flex-shrink-0 border-r border-purple-500/10 flex flex-col glass">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Чаты</h2>
                <button id="settings-trigger" class="p-2 bg-purple-500/10 rounded-xl">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                </button>
            </div>
            <div class="relative">
                <input id="user-search" type="text" placeholder="Поиск по @юзернейму..." class="w-full p-3 pl-10 rounded-xl bg-black/20 border border-purple-500/20 text-sm outline-none focus:border-purple-500">
                <svg class="w-4 h-4 absolute left-3 top-3.5 text-purple-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div id="chats-list" class="flex-1 overflow-y-auto scroll-hide space-y-1 p-2">
            </div>
    </div>

    <div id="chat-window" class="flex-1 flex flex-col bg-black/20">
        <div class="p-4 glass flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <button id="close-chat" class="md:hidden">←</button>
                <div id="chat-avatar" class="w-10 h-10 violet-gradient rounded-xl flex items-center justify-center font-bold">?</div>
                <div>
                    <h3 id="chat-with-name" class="font-bold leading-tight">Выберите чат</h3>
                    <p id="chat-status" class="text-[10px] text-purple-400">последние сообщения</p>
                </div>
            </div>
        </div>

        <div id="messages-display" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 scroll-hide">
            <div class="text-center text-gray-500 text-xs mt-20">Здесь будет ваша переписка</div>
        </div>

        <div class="p-4 bg-black/40 border-t border-purple-500/10">
            <div class="max-w-4xl mx-auto flex items-end gap-3 glass p-2 rounded-[24px]">
                <button id="media-mode" class="p-3 text-purple-400 hover:bg-purple-500/10 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18.75a6 6 0 100-12 6 6 0 000 12zM15 13.5a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <textarea id="msg-input" rows="1" placeholder="Сообщение..." class="flex-1 bg-transparent p-3 outline-none resize-none text-sm"></textarea>
                <button id="send-msg" class="p-4 violet-gradient rounded-2xl shadow-lg active:scale-90 transition-all">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
            <video id="video-preview" autoplay muted playsinline class="mx-auto mt-2"></video>
        </div>
    </div>
</div>

<div id="settings-modal" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-xl flex items-center justify-center hidden p-4">
    <div class="glass w-full max-w-lg rounded-[40px] overflow-hidden flex flex-col max-h-[90vh]">
        <div class="p-6 border-b border-purple-500/20 flex justify-between items-center">
            <h3 class="text-xl font-bold">Настройки профиля</h3>
            <button id="close-settings" class="p-2 hover:bg-white/10 rounded-full">✕</button>
        </div>
        
        <div class="p-8 overflow-y-auto scroll-hide space-y-6">
            <div class="space-y-4">
                <div class="flex items-center gap-6 mb-4">
                    <div id="my-avatar" class="w-20 h-20 violet-gradient rounded-[24px] flex items-center justify-center text-3xl font-bold shadow-xl">U</div>
                    <div class="flex-1">
                        <label class="block text-xs text-purple-400 mb-1">Имя в системе</label>
                        <input id="edit-name" type="text" class="w-full bg-white/5 p-2 rounded-lg outline-none border border-white/10 focus:border-purple-500">
                    </div>
                </div>
                <button id="save-profile" class="w-full py-3 bg-purple-600 rounded-xl text-sm font-bold">Сохранить изменения</button>
            </div>

            <hr class="border-purple-500/20">

            <button id="sigma-auth-trigger" class="w-full p-4 bg-amber-500/10 border border-amber-500/30 text-amber-500 rounded-2xl font-black italic tracking-widest hover:bg-amber-500/20 transition-all">⚡ SIGMA PANEL ⚡</button>
            
            <div id="sigma-lock" class="hidden space-y-3 p-4 bg-black/40 rounded-2xl border border-red-500/20">
                <p class="text-xs text-center text-red-400 uppercase font-bold">Введите мастер-пароль</p>
                <input id="sigma-pass" type="password" class="w-full p-3 bg-black rounded-xl border border-red-500/30 outline-none text-center tracking-[1em]">
                <button id="sigma-unlock-btn" class="w-full py-2 bg-red-600 rounded-lg text-xs font-bold">ACCESS GRANTED?</button>
            </div>

            <div id="sigma-content" class="hidden space-y-3">
                <h4 class="text-amber-500 font-bold">Управление душами (Accounts)</h4>
                <div id="sigma-users-list" class="space-y-2"></div>
            </div>

            <button id="logout-btn" class="w-full p-4 text-gray-500 text-xs hover:text-red-400 transition-colors">Выйти из системы</button>
        </div>
    </div>
</div>

<script type="module">
    // --- FIREBASE SETUP ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaCtnz5ZJPJtq04Xm24dw5xc7QPZUHue",
        authDomain: "bittalk-e6df4.firebaseapp.com",
        databaseURL: "https://bittalk-e6df4-default-rtdb.firebaseio.com",
        projectId: "bittalk-e6df4",
        storageBucket: "bittalk-e6df4.firebasestorage.app",
        messagingSenderId: "1083926758846",
        appId: "1:1083926758846:web:51032b148e48556bca25ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- STATE ---
    let currentUser = JSON.parse(localStorage.getItem('bt_v3_user')) || null;
    let selectedChat = null;
    const SIGMA_KEY = "1234567891011121314151617181920";

    // --- UI ELEMENTS ---
    const screens = { auth: document.getElementById('auth-screen'), main: document.getElementById('main-app') };
    const authMsg = document.getElementById('auth-msg');

    // --- AUTH LOGIC ---
    function init() {
        if (currentUser) {
            screens.auth.classList.add('hidden');
            screens.main.classList.remove('hidden');
            loadChats();
            syncProfileUI();
        }
    }

    document.getElementById('login-btn').onclick = async () => {
        const login = document.getElementById('auth-login').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        if (!login || !pass) return error("Заполните поля");

        onValue(ref(db, 'users/' + login), (snapshot) => {
            const user = snapshot.val();
            if (user && user.pass === pass) {
                loginUser(user);
            } else if (user) {
                error("Неверный пароль");
            } else {
                // Если юзера нет - предлагаем регистрацию через ту же кнопку
                if (confirm("Аккаунт не найден. Создать новый?")) {
                    const newUser = { login, pass, name: login, avatar: '' };
                    set(ref(db, 'users/' + login), newUser);
                    loginUser(newUser);
                }
            }
        }, { onlyOnce: true });
    };

    function loginUser(user) {
        currentUser = user;
        localStorage.setItem('bt_v3_user', JSON.stringify(user));
        location.reload();
    }

    function error(text) {
        authMsg.innerText = text;
        authMsg.classList.remove('hidden');
    }

    // --- CHATS & MESSAGES ---
    function loadChats() {
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            for (let id in users) {
                if (id === currentUser.login) continue;
                const u = users[id];
                list.innerHTML += `
                    <div onclick="openChat('${id}')" class="p-4 flex items-center gap-3 cursor-pointer hover:bg-purple-500/10 rounded-2xl transition-all">
                        <div class="w-12 h-12 violet-gradient rounded-xl flex items-center justify-center font-bold text-lg">${u.name[0]}</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="flex justify-between items-baseline"><span class="font-bold">@${id}</span></div>
                            <p class="text-xs text-gray-500 truncate">${u.name}</p>
                        </div>
                    </div>
                `;
            }
        });
    }

    window.openChat = (userId) => {
        selectedChat = userId;
        document.getElementById('chat-with-name').innerText = "@" + userId;
        document.getElementById('chat-avatar').innerText = userId[0].toUpperCase();
        document.getElementById('messages-display').innerHTML = '';
        
        // Генерируем ID комнаты (всегда одинаковый для пары юзеров)
        const roomId = [currentUser.login, userId].sort().join('_');
        const roomRef = ref(db, 'rooms/' + roomId);

        onChildAdded(roomRef, (data) => {
            renderMessage(data.val());
        });
    };

    function renderMessage(msg) {
        const area = document.getElementById('messages-display');
        const isMine = msg.sender === currentUser.login;
        const html = `
            <div class="flex ${isMine ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300">
                <div class="${isMine ? 'msg-mine' : 'msg-other'} p-3 px-4 shadow-xl max-w-[75%]">
                    <p class="text-sm leading-relaxed">${msg.text}</p>
                    <span class="text-[9px] opacity-40 block text-right mt-1">${msg.time}</span>
                </div>
            </div>
        `;
        area.insertAdjacentHTML('beforeend', html);
        area.scrollTop = area.scrollHeight;
    }

    document.getElementById('send-msg').onclick = () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !selectedChat) return;

        const roomId = [currentUser.login, selectedChat].sort().join('_');
        push(ref(db, 'rooms/' + roomId), {
            sender: currentUser.login,
            text: input.value,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        input.value = '';
    };

    // --- SIGMA PANEL & SETTINGS ---
    document.getElementById('settings-trigger').onclick = () => document.getElementById('settings-modal').classList.remove('hidden');
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-modal').classList.add('hidden');

    document.getElementById('sigma-auth-trigger').onclick = () => document.getElementById('sigma-lock').classList.toggle('hidden');

    document.getElementById('sigma-unlock-btn').onclick = () => {
        const val = document.getElementById('sigma-pass').value;
        if (val === SIGMA_KEY) {
            document.getElementById('sigma-lock').classList.add('hidden');
            document.getElementById('sigma-content').classList.remove('hidden');
            renderSigmaUsers();
        } else {
            alert("SKIBIDI TOILET ERROR: WRONG CODE");
        }
    };

    function renderSigmaUsers() {
        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const list = document.getElementById('sigma-users-list');
            list.innerHTML = '';
            for(let id in users) {
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 glass rounded-xl">
                        <span class="text-xs font-mono">@${id}</span>
                        <div class="flex gap-2">
                            <button onclick="window.sigmaLogin('${id}')" class="bg-green-600 px-2 py-1 rounded text-[10px]">HACK</button>
                        </div>
                    </div>
                `;
            }
        });
    }

    window.sigmaLogin = (id) => {
        onValue(ref(db, 'users/' + id), (s) => loginUser(s.val()), {onlyOnce:true});
    };

    document.getElementById('logout-btn').onclick = () => {
        localStorage.removeItem('bt_v3_user');
        location.reload();
    };

    function syncProfileUI() {
        document.getElementById('my-avatar').innerText = currentUser.name[0];
        document.getElementById('edit-name').value = currentUser.name;
    }

    document.getElementById('save-profile').onclick = () => {
        const newName = document.getElementById('edit-name').value;
        currentUser.name = newName;
        set(ref(db, 'users/' + currentUser.login), currentUser);
        localStorage.setItem('bt_v3_user', JSON.stringify(currentUser));
        alert("Профиль обновлен!");
    };

    init();
</script>
</body>
    </html>
